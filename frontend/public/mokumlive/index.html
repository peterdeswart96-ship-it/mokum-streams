<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Mokum Pool & Darts — Live standen</title>
<link rel="icon" href="/mokum-logo.png">
<link rel="apple-touch-icon" href="/mokum-logo.png">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Mokum standen">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: Arial, Helvetica, sans-serif;
    background: #0a0a0a; color: #cccccc; -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 5;
    background: #1a1a1a;
    padding: 14px 16px; border-bottom: 1px solid #2a2a2a;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px;
  }
  header h1 { margin: 0; font-size: 18px; font-family: "Arial Black", Arial, sans-serif; letter-spacing: .2px; color: #fff; }
  header h1 .m { color: #cc0000; }
  header .sub { font-size: 12px; color: #999; margin-top: 2px; }
  /* Gecentreerde paginatitel in de bovenbalk (zelfde stijl als de rest). */
  .kop-titel { text-align: center; }
  .kop-titel .titel { font-family: "Arial Black", Arial, sans-serif; font-size: 22px; color: #fff; line-height: 1.05; }
  .kop-titel .titel .m { color: #cc0000; }
  .kop-titel .titel-sub { font-size: 12px; color: #999; margin-top: 3px; }
  @media (max-width: 620px) {
    header .bar > div { display: none; } /* op smal scherm alleen het logo links */
    .kop-titel .titel { font-size: 18px; }
  }
  main { padding: 12px 12px 40px; max-width: 640px; margin: 0 auto; }
  .melding { color: #999; text-align: center; padding: 40px 16px; font-size: 15px; }
  .sectiekop { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: #999; margin: 16px 4px 8px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #cc0000; box-shadow: 0 0 0 4px rgba(204,0,0,.2); }

  /* Live-gloed: langzaam pulserende rode omlijning op wat NU speelt. */
  @keyframes gloed {
    0%, 100% { box-shadow: 0 0 0 1px #cc0000, 0 0 6px rgba(204,0,0,.30); }
    50%      { box-shadow: 0 0 0 1px #ff3b3b, 0 0 18px rgba(204,0,0,.75); }
  }
  @media (prefers-reduced-motion: reduce) { .kaart.live, .mrij.live { animation: none; } }

  /* Standaard-weergave: kaarten. Niet-live tafels krijgen géén omlijning. */
  .kaart {
    background: #1a1a1a; border: 1px solid transparent; border-radius: 10px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .kaart.live { border-color: #cc0000; animation: gloed 2.4s ease-in-out infinite; }
  .kaart.klaar { opacity: .55; }
  .kaart .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .tafel { font-family: "Arial Black", Arial, sans-serif; font-size: 13px; background: #2a2a2a; color: #fff; border-radius: 6px; padding: 3px 9px; }
  .toernooi { font-size: 11px; color: #999; text-align: right; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rij { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .speler { font-size: 15px; font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .speler.b { text-align: right; }
  /* Score altijd gecentreerd rond het streepje: beide helften even breed. */
  .score { font-size: 20px; font-family: "Arial Black", Arial, sans-serif; color: #fff; display: inline-flex; align-items: baseline; justify-content: center; }
  .score .sa { min-width: 28px; text-align: right; }
  .score .sb { min-width: 28px; text-align: left; }
  .score .sep { color: #666; margin: 0 4px; }
  .raceto { text-align: center; font-size: 11px; color: #999; margin-top: 6px; }
  .kijk {
    display: inline-block; margin-top: 8px; font-size: 12px; font-weight: bold;
    color: #ff6b6b; text-decoration: none;
  }
  .kijk:hover { color: #cc0000; }

  /* Minimal-weergave: één compacte regel per wedstrijd. Links (tafel + speler A) en
     rechts (speler B + 📺) zijn even breed (flex:1) zodat de score altijd exact in het
     midden staat, ongeacht de breedte van het tafelnummer of het 📺-icoon. */
  .mrij {
    display: flex; align-items: center; gap: 10px;
    background: #1a1a1a; border: 1px solid transparent; border-radius: 8px;
    padding: 8px 10px; margin-bottom: 6px;
  }
  .mrij.live { border-color: #cc0000; animation: gloed 2.4s ease-in-out infinite; }
  .mrij.klaar { opacity: .55; }
  .mrij .helft { flex: 1 1 0; min-width: 0; display: flex; align-items: center; gap: 8px; }
  .mrij .helft.rechts { justify-content: flex-end; }
  .mrij .mt { flex: 0 0 auto; font-family: "Arial Black", Arial, sans-serif; font-size: 12px; background: #2a2a2a; color: #fff; border-radius: 5px; padding: 2px 7px; }
  .mrij .ma { flex: 1 1 auto; min-width: 0; font-size: 14px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mrij .mb { flex: 0 1 auto; min-width: 0; font-size: 14px; color: #fff; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mrij .ms { flex: 0 0 auto; font-size: 15px; font-family: "Arial Black", Arial, sans-serif; color: #fff; display: inline-flex; align-items: baseline; }
  .mrij .ms .sa { min-width: 20px; text-align: right; }
  .mrij .ms .sb { min-width: 20px; text-align: left; }
  .mrij .ms .sep { color: #666; margin: 0 4px; }
  .mrij .mk { flex: 0 0 auto; text-decoration: none; font-size: 15px; line-height: 1; }

  /* Pin-knop om een tafel vast te pinnen. Los = grijze omtrek, schuin gekanteld;
     gepind = massief rood en rechtop. SVG zodat we de kleur écht kunnen sturen. */
  .pin { flex: 0 0 auto; cursor: pointer; background: none; border: 0; padding: 3px; line-height: 0; color: #8a8a8a; transform: rotate(-30deg); transition: transform .15s ease, color .15s ease; }
  .pin svg { width: 17px; height: 17px; display: block; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .pin:hover { color: #ff6b6b; }
  .pin.aan { color: #cc0000; transform: rotate(0deg); }
  .pin.aan svg { fill: currentColor; }
  .top .tafelwrap { display: inline-flex; align-items: center; gap: 4px; }

  /* Livestream-paneel onder de standen (zelfde stijl als het dashboard). */
  .stream { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px; margin-top: 22px; }
  .streamkop { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .streamkop h2 { margin: 0; font-family: "Arial Black", Arial, sans-serif; font-size: 18px; color: #fff; }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab { cursor: pointer; display: inline-flex; align-items: center; gap: 6px; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px; color: #ccc; font: inherit; font-size: 13px; padding: 7px 12px; }
  .tab .tabdot { width: 7px; height: 7px; border-radius: 50%; background: #ff6b6b; }
  .tab.aan { background: #cc0000; border-color: #cc0000; color: #fff; font-weight: bold; }
  .tab.aan .tabdot { background: #fff; }
  .video { position: relative; width: 100%; padding-top: 56.25%; border-radius: 8px; overflow: hidden; background: #000; }
  .video iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
  .geenstream { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #999; font-size: 14px; text-align: center; padding: 20px; }
  .streamhint { font-size: 11px; color: #666; margin-top: 8px; }

  footer { text-align: center; color: #666; font-size: 11px; padding: 8px 16px 24px; }
  footer a { color: #999; }
  .bar { display: flex; align-items: center; gap: 12px; }
  .logo { height: 40px; width: auto; flex: none; }
  .zoek {
    width: 100%; box-sizing: border-box; margin: 4px 0 4px; padding: 10px 12px;
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
    color: #fff; font-size: 15px; font-family: inherit;
  }
  .zoek::placeholder { color: #777; }

  /* Werkbalk: filterknop links, weergave-schakelaar rechts. */
  .toolbar { display: flex; align-items: center; gap: 8px; margin: 2px 0 8px; }
  .toolbar .spacer { flex: 1; }
  /* Toernooi-ticker: de toernooinaam scrolt langzaam voorbij (bespaart ruimte). */
  .ticker { flex: 1 1 0; min-width: 60px; overflow: hidden; height: 34px; display: flex; align-items: center; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; }
  .tickertrack { display: inline-flex; white-space: nowrap; will-change: transform; animation: tickerscroll linear infinite; }
  .tickertrack span { padding: 0 22px; color: #cbd5e1; font-size: 13px; }
  .ticker:hover .tickertrack { animation-play-state: paused; }
  @keyframes tickerscroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @media (prefers-reduced-motion: reduce) { .tickertrack { animation: none; } }
  .knop {
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
    color: #ccc; font: inherit; font-size: 13px; padding: 8px 11px;
  }
  .knop:hover { color: #fff; border-color: #3a3a3a; }
  .knop.actief { border-color: #cc0000; color: #fff; }
  .knop .telpil { background: #cc0000; color: #fff; border-radius: 999px; font-size: 11px; padding: 0 6px; font-weight: bold; }
  /* Segment-schakelaar (Standaard | Minimal). */
  .seg { display: inline-flex; border: 1px solid #2a2a2a; border-radius: 8px; overflow: hidden; }
  .seg button { cursor: pointer; background: #1a1a1a; border: 0; color: #999; font: inherit; font-size: 13px; font-weight: bold; padding: 8px 0; min-width: 34px; text-align: center; }
  .seg button.aan { background: #cc0000; color: #fff; }
  .seg .xl-knop { display: none; } /* XL is alleen voor desktop */

  /* XL-weergave (alleen desktop ≥1000px): links een strook met filters + standen,
     rechts een grote, zo beeldvullend mogelijke livestream. */
  @media (min-width: 1000px) {
    .seg .xl-knop { display: block; }
    /* Volle breedte gebruiken: smalle strook links, de rest voor de livestream. */
    body.xl main { max-width: none; width: 100%; display: grid; grid-template-columns: minmax(320px, 380px) 1fr; gap: 18px; align-items: start; padding: 12px 18px 24px; }
    body.xl #kolomlinks { min-width: 0; }
    body.xl #streampaneel { margin-top: 0; position: sticky; top: 16px; }
    body.xl .streamkop h2 { font-size: 20px; }
    /* Video zo groot mogelijk: het grootste 16:9-vlak dat in de resterende breedte
       én de schermhoogte past (voorkomt zwarte balken en loze ruimte). */
    /* Cap op 1920px (native 1080p): niet groter uitrekken dan de bron → blijft scherp. */
    body.xl .video { padding-top: 0; aspect-ratio: 16 / 9; width: min(100%, calc((100vh - 200px) * 16 / 9)); max-width: 1920px; margin: 0 auto; }
  }

  /* Uitklapbaar filterpaneel. */
  .filters { display: none; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
  .filters.open { display: block; }
  .filters .veld { display: block; font-size: 12px; color: #999; margin: 0 0 10px; }
  .filters .veld input {
    width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 11px;
    background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; font: inherit; font-size: 15px;
  }
  .filters label { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #ccc; margin: 10px 0; cursor: pointer; }
  .filters input[type=checkbox] { width: 18px; height: 18px; accent-color: #cc0000; flex: none; }
  .filters .reset { margin-top: 6px; background: transparent; border: 1px solid #2a2a2a; color: #ff6b6b; border-radius: 8px; padding: 8px 12px; cursor: pointer; font: inherit; font-size: 13px; }
  .filters .reset:hover { border-color: #cc0000; }
</style>
</head>
<body>
  <header>
    <div class="bar">
      <img class="logo" src="/mokum-logo.png" alt="Mokum Pool & Darts">
    </div>
    <div class="kop-titel">
      <div class="titel"><span class="m">Mokum</span> Live</div>
      <div class="titel-sub">Standen en livestreams</div>
    </div>
  </header>
  <main>
    <div id="kolomlinks">
    <input id="zoek" class="zoek" type="search" placeholder="Zoek speler of tafel…" autocomplete="off">
    <div class="toolbar">
      <button id="filterKnop" class="knop" type="button" aria-expanded="false" aria-controls="filters">
        ▾ Filters <span id="filterTel" class="telpil" hidden>0</span>
      </button>
      <div id="ticker" class="ticker" aria-label="Toernooi van vandaag" hidden></div>
      <div class="seg" role="group" aria-label="Weergave">
        <button id="wMinimal" type="button" title="Minimal — compacte lijst (klein)">S</button>
        <button id="wStandaard" type="button" title="Standaard — kaarten">M</button>
        <button id="wXL" type="button" class="xl-knop" title="XL — brede desktopweergave met grote livestream 🖥️">XL</button>
      </div>
    </div>
    <div id="filters" class="filters">
      <span class="veld">Toon alleen deze tafels (tafelnummers met komma's, bijv. <b>1,3,15</b>) — leeg = alle
        <input id="fTafels" type="text" inputmode="numeric" placeholder="alle tafels" autocomplete="off">
      </span>
      <label><input id="fGepind" type="checkbox"> Alleen gepinde tafels weergeven 📌</label>
      <label><input id="fAfgelopen" type="checkbox"> Afgelopen wedstrijden verbergen</label>
      <label><input id="fYoutube" type="checkbox"> Alleen wedstrijden die live op YouTube zijn</label>
      <button id="fReset" class="reset" type="button">Reset alle filters</button>
    </div>
    <div id="inhoud"><div class="melding">Laden…</div></div>
    </div>

    <section id="streampaneel" class="stream" hidden>
      <div class="streamkop">
        <h2>Livestream</h2>
        <div class="tabs" id="streamtabs"></div>
      </div>
      <div class="video" id="streamvideo"></div>
      <div class="streamhint">YouTube-vertraging ~10-30s — het beeld loopt iets achter op de zaal.</div>
    </section>
  </main>
  <footer>Bijgewerkt <span id="ts">—</span> · standen via Cuescore</footer>

<script>
  const VENUE = 60451687;
  const REFRESH_MS = 20000;
  const API = 'https://api.cuescore.com';
  const APP_API = 'https://mokum-streams-func.azurewebsites.net'; // onze backend (voor 'kijk live'-links)
  const CAMERAS = [1, 3, 15, 16]; // tafels met camera (zelfde als het dashboard)

  let STREAM_SEL = CAMERAS[0];       // gekozen tafel in het livestream-paneel
  let STREAM_VID_GETOOND = null;     // welk videoId nu in de iframe staat (om herladen te voorkomen)
  let streamAutoGekozen = false;     // eenmalig de eerste live tafel kiezen

  let ALLE = [];     // alle wedstrijden van vandaag (met _toernooi)
  let STREAMS = {};  // { "<tafelnr>": youtube-videoId } — welke tafels wij live streamen
  let GELADEN = false;
  let TOERNOOINAMEN = [];         // unieke toernooinamen van vandaag (voor de ticker)
  let TICKER_GETOOND = null;      // welke tekst nu in de ticker staat (om herstart te voorkomen)

  // Weergave + filters, onthouden in de browser (localStorage).
  const LS_WEERGAVE = 'standen_weergave';
  const LS_FILTERS = 'standen_filters';
  const LS_PINS = 'standen_pins';
  let WEERGAVE = 'minimal'; // 'standaard' | 'minimal' — minimal is de standaard
  let FILTERS = { tafels: '', afgelopen: false, youtube: false, gepind: false };
  let PINS = new Set(); // vastgepinde tafelnummers (jouw eigen favorieten)
  try {
    const w = localStorage.getItem(LS_WEERGAVE);
    if (w === 'minimal' || w === 'standaard' || w === 'xl') WEERGAVE = w;
    const f = JSON.parse(localStorage.getItem(LS_FILTERS) || 'null');
    if (f && typeof f === 'object') FILTERS = { tafels: '', afgelopen: false, youtube: false, gepind: false, ...f };
    const p = JSON.parse(localStorage.getItem(LS_PINS) || '[]');
    if (Array.isArray(p)) PINS = new Set(p.map(Number).filter((n) => !Number.isNaN(n)));
  } catch (e) { /* privacymodus e.d. → gewoon standaard */ }

  function bewaar() {
    try {
      localStorage.setItem(LS_WEERGAVE, WEERGAVE);
      localStorage.setItem(LS_FILTERS, JSON.stringify(FILTERS));
      localStorage.setItem(LS_PINS, JSON.stringify([...PINS]));
    } catch (e) { /* niet fataal */ }
  }

  const isPin = (tnr) => PINS.has(Number(tnr));
  function togglePin(tnr) {
    const n = Number(tnr);
    if (Number.isNaN(n)) return;
    if (PINS.has(n)) PINS.delete(n); else PINS.add(n);
    bewaar(); pasControlsToe(); render();
  }

  // Cookieloze bezoek-/QR-teller (#18 fase 1): meld één paginaweergave met de bron uit
  // utm_source (bv. 'qr' vanaf de QR-overlay). Fire-and-forget, geen cookies, geen
  // persoonsgegevens → geen consent-banner. Mag nooit de pagina blokkeren.
  (function meldBezoek() {
    try {
      const bron = new URLSearchParams(location.search).get('utm_source') || 'direct';
      const url = `${APP_API}/api/hit?source=${encodeURIComponent(bron)}&page=mokumlive`;
      if (navigator.sendBeacon) navigator.sendBeacon(url);
      else fetch(url, { method: 'POST', mode: 'no-cors', keepalive: true });
    } catch (e) { /* teller nooit fataal */ }
  })();

  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  const num = (s) => { const n = parseInt(String(s ?? '').replace(/\D/g, ''), 10); return Number.isNaN(n) ? 9999 : n; };
  const vandaag = () => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); };

  async function haalJson(url) {
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  async function laad() {
    try {
      // Onze eigen live-stream-info (voor de 'kijk live'-links + YouTube-filter) — mag falen.
      haalJson(`${APP_API}/api/live`).then((live) => {
        const map = {};
        for (const t of (live.tables || [])) {
          const v = t.liveVideoId || t.videoId;
          if (v) map[String(t.tableNumber)] = v;
        }
        STREAMS = map; render(); renderStream();
      }).catch(() => {});

      const ev = await haalJson(`${API}/venue/events/?venueId=${VENUE}&date=${vandaag()}`);
      const ids = Array.isArray(ev.events) ? ev.events : [];
      const toernooien = ids.length
        ? await Promise.all(ids.map((id) => haalJson(`${API}/tournament/?lang=nl&id=${id}`).catch(() => null)))
        : [];
      const matches = [];
      for (const t of toernooien) {
        if (!t || !Array.isArray(t.matches)) continue;
        for (const m of t.matches) { m._toernooi = t.name || ''; matches.push(m); }
      }
      ALLE = matches;
      // Ticker: toon het toernooi dat op ónze cameratafels (1/3/15/16) loopt — dat is wat
      // we streamen. Zo valt een parallelle league op andere tafels (bv. 14.1 Summer
      // League) weg. Fallback: staat er (nog) niets op de cameratafels, toon dan de
      // toernooien die vandaag écht gespeeld worden (playing/finished).
      const cameraSet = new Set(CAMERAS);
      const naam = (m) => (m._toernooi || '').trim();
      let namen = matches.filter((m) => heeftTafel(m) && cameraSet.has(num(m.table && m.table.name))).map(naam).filter(Boolean);
      if (!namen.length) {
        namen = matches.filter((m) => heeftTafel(m) && (st(m) === 'playing' || st(m) === 'finished')).map(naam).filter(Boolean);
      }
      TOERNOOINAMEN = [...new Set(namen)];
      GELADEN = true;
      document.getElementById('ts').textContent = new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
      render();
      renderTicker();
    } catch (e) {
      if (!GELADEN) toon(`<div class="melding">Kon de standen even niet laden.<br>De pagina probeert het zo opnieuw.</div>`);
    }
  }

  // Zet "1,3,15" om naar een Set van tafelnummers; leeg/ongeldig → null (= alle tafels).
  function parseTafels(s) {
    const nums = String(s || '').split(',').map((x) => parseInt(x.replace(/\D/g, ''), 10)).filter((n) => !Number.isNaN(n));
    return nums.length ? new Set(nums) : null;
  }

  const st = (m) => String(m.matchstatus || '').toLowerCase();
  const heeftTafel = (m) => m.table && m.table.name != null && String(m.table.name).trim() !== '';
  // Rode gloed = deze tafel is NU live op ónze YouTube (heeft een 📺), niet zomaar
  // elke lopende Cuescore-wedstrijd.
  const opYoutube = (m) => !!STREAMS[String(m.table && m.table.name)];
  const tijd = (iso) => { const t = Date.parse(iso || ''); return Number.isNaN(t) ? 0 : t; };
  const opTafel = (a, b) => num(a.table && a.table.name) - num(b.table && b.table.name);

  // Hoeveel filters staan aan (voor het telpilletje op de filterknop).
  function actieveFilters() {
    return (FILTERS.tafels && parseTafels(FILTERS.tafels) ? 1 : 0) + (FILTERS.afgelopen ? 1 : 0) + (FILTERS.youtube ? 1 : 0) + (FILTERS.gepind ? 1 : 0);
  }

  // Bouwt de weergave uit ALLE, met zoekterm (#29) + filters (#…) toegepast.
  function render() {
    if (!GELADEN) return;
    const q = (document.getElementById('zoek').value || '').trim().toLowerCase();
    const tafelSet = parseTafels(FILTERS.tafels);
    const zoekt = (m) => {
      if (!q) return true;
      const a = ((m.playerA && m.playerA.name) || '').toLowerCase();
      const b = ((m.playerB && m.playerB.name) || '').toLowerCase();
      const tf = String((m.table && m.table.name) || '').toLowerCase();
      return a.includes(q) || b.includes(q) || tf === q || ('tafel ' + tf).includes(q);
    };
    const filtert = (m) => {
      if (tafelSet && !tafelSet.has(num(m.table && m.table.name))) return false;
      if (FILTERS.afgelopen && st(m) === 'finished') return false;
      if (FILTERS.youtube && !STREAMS[String((m.table && m.table.name) || '')]) return false;
      if (FILTERS.gepind && !isPin(num(m.table && m.table.name))) return false;
      return true;
    };
    const basis = ALLE.filter((m) => heeftTafel(m) && zoekt(m) && filtert(m));

    const live = basis.filter((m) => st(m) === 'playing').sort(opTafel);
    const straks = basis.filter((m) => st(m) === 'waiting').sort(opTafel).slice(0, 12);
    const afgelopen = basis.filter((m) => st(m) === 'finished').sort((a, b) => tijd(b.stoptime) - tijd(a.stoptime)).slice(0, 8);

    // Minimal én XL tonen dezelfde compacte lijst; XL zet die alleen links in een
    // strook met de grote livestream ernaast (via de body.xl-lay-out).
    if (WEERGAVE === 'minimal' || WEERGAVE === 'xl') {
      const rijen = [...live, ...straks, ...afgelopen].sort(opTafel);
      return rijen.length ? toon(rijen.map(mrij).join('')) : toonLeeg(q);
    }

    const secties = [];
    if (live.length) secties.push(sectie('Nu live', live, 'live'));
    if (straks.length) secties.push(sectie('Straks', straks, 'straks'));
    if (afgelopen.length) secties.push(sectie('Net afgelopen', afgelopen, 'klaar'));
    return secties.length ? toon(secties.join('')) : toonLeeg(q);
  }

  function toonLeeg(q) {
    if (FILTERS.gepind && PINS.size === 0) {
      return toon(`<div class="melding">Je hebt nog geen tafels vastgepind.<br>Tik op 📌 bij een wedstrijd om je eigen weergave te maken.</div>`);
    }
    const ietsActief = q || actieveFilters();
    return toon(`<div class="melding">${ietsActief
      ? 'Geen wedstrijden die aan je zoekopdracht/filters voldoen.'
      : 'Nog geen wedstrijden.<br>Zodra er gespeeld wordt, verschijnen de standen hier vanzelf.'}</div>`);
  }

  function sectie(titel, lijst, soort) {
    const dot = soort === 'live' ? '<span class="dot"></span> ' : '';
    return `<div class="sectiekop">${dot}${esc(titel)} · ${lijst.length}</div>${lijst.map((m) => kaart(m)).join('')}`;
  }

  function kaart(m) {
    const a = (m.playerA && m.playerA.name) || 'nog onbekend';
    const b = (m.playerB && m.playerB.name) || 'nog onbekend';
    const sa = m.scoreA != null ? m.scoreA : 0;
    const sb = m.scoreB != null ? m.scoreB : 0;
    const tnr = (m.table && m.table.name) ? String(m.table.name) : '';
    const tafel = tnr ? `Tafel ${esc(tnr)}` : 'Tafel';
    const race = m.raceTo ? `Race naar ${esc(m.raceTo)}` : '';
    const vid = STREAMS[tnr];
    const kijk = vid ? `<a class="kijk" href="https://www.youtube.com/watch?v=${esc(vid)}" target="_blank" rel="noreferrer">📺 Kijk deze tafel live</a>` : '';
    // Gloed alleen als wij deze tafel live streamen (📺); afgelopen wedstrijden dimmen.
    const cls = [vid ? 'live' : '', st(m) === 'finished' ? 'klaar' : ''].filter(Boolean).join(' ');
    const pin = tnr ? pinKnop(tnr) : '';
    return `
      <div class="kaart ${cls}">
        <div class="top">
          <span class="tafelwrap">${pin}<span class="tafel">${tafel}</span></span>
          <span class="toernooi">${esc(m._toernooi)}</span>
        </div>
        <div class="rij">
          <div class="speler">${esc(a)}</div>
          <div class="score"><span class="sa">${esc(sa)}</span><span class="sep">-</span><span class="sb">${esc(sb)}</span></div>
          <div class="speler b">${esc(b)}</div>
        </div>
        ${race ? `<div class="raceto">${race}</div>` : ''}
        ${kijk}
      </div>`;
  }

  // Eén compacte regel (minimal-weergave): [tafel] speler A  score  speler B  [📺]
  function mrij(m) {
    const a = (m.playerA && m.playerA.name) || 'nog onbekend';
    const b = (m.playerB && m.playerB.name) || 'nog onbekend';
    const sa = m.scoreA != null ? m.scoreA : 0;
    const sb = m.scoreB != null ? m.scoreB : 0;
    const tnr = (m.table && m.table.name) ? String(m.table.name) : '?';
    const vid = STREAMS[String(m.table && m.table.name)];
    const kijk = vid
      ? `<a class="mk" title="Kijk deze tafel live" href="https://www.youtube.com/watch?v=${esc(vid)}" target="_blank" rel="noreferrer">📺</a>`
      : '';
    // Gloed alleen als wij deze tafel live streamen (📺); afgelopen wedstrijden dimmen.
    const soort = [vid ? 'live' : '', st(m) === 'finished' ? 'klaar' : ''].filter(Boolean).join(' ');
    return `<div class="mrij ${soort}">
      <span class="helft links">${pinKnop(tnr)}<span class="mt">${esc(tnr)}</span><span class="ma">${esc(a)}</span></span>
      <span class="ms"><span class="sa">${esc(sa)}</span><span class="sep">-</span><span class="sb">${esc(sb)}</span></span>
      <span class="helft rechts"><span class="mb">${esc(b)}</span>${kijk}</span>
    </div>`;
  }

  // De pin-knop voor een tafel. data-tafel wordt door de klik-afhandelaar gebruikt.
  const PIN_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>';
  function pinKnop(tnr) {
    const aan = isPin(tnr);
    return `<button type="button" class="pin ${aan ? 'aan' : ''}" data-tafel="${esc(tnr)}" title="${aan ? 'Losmaken' : 'Vastpinnen'}" aria-label="${aan ? 'Tafel losmaken' : 'Tafel vastpinnen'}" aria-pressed="${aan}">${PIN_SVG}</button>`;
  }

  function toon(html) { document.getElementById('inhoud').innerHTML = html; }

  // Toernooi-ticker: laat de toernooinaam/-namen van vandaag langzaam voorbij scrollen.
  // Bouwt alleen opnieuw als de tekst wijzigt (anders zou de animatie steeds herstarten).
  function renderTicker() {
    const el = document.getElementById('ticker');
    if (!el) return;
    const tekst = TOERNOOINAMEN.join(' • '); // ruime bullet-scheiding
    if (tekst === TICKER_GETOOND) return;
    TICKER_GETOOND = tekst;
    if (!tekst) { el.hidden = true; el.innerHTML = ''; return; }
    // Snelheid schaalt met de lengte → overal ongeveer even "langzaam".
    const dur = Math.min(90, Math.max(18, tekst.length * 0.4));
    const span = `<span>${esc(tekst)}</span>`;
    // Twee identieke kopieën + translateX(-50%) = naadloze lus.
    el.innerHTML = `<div class="tickertrack" style="animation-duration:${dur}s">${span}${span}</div>`;
    el.hidden = false;
  }

  // Livestream-paneel: tabs voor de cameratafels + de YouTube-embed van de gekozen tafel.
  // De iframe wordt alleen herbouwd als het videoId wijzigt, zodat de 20s-verversing de
  // lopende stream niet telkens herlaadt.
  function renderStream() {
    const paneel = document.getElementById('streampaneel');
    if (!paneel) return;
    // Eenmalig automatisch de eerste tafel kiezen die echt live is.
    if (!streamAutoGekozen && Object.keys(STREAMS).length) {
      const eersteLive = CAMERAS.find((nr) => STREAMS[String(nr)]);
      if (eersteLive) STREAM_SEL = eersteLive;
      streamAutoGekozen = true;
    }
    document.getElementById('streamtabs').innerHTML = CAMERAS.map((nr) => {
      const heeft = !!STREAMS[String(nr)];
      const aan = nr === STREAM_SEL;
      return `<button type="button" class="tab ${aan ? 'aan' : ''}" data-nr="${nr}">${heeft ? '<span class="tabdot"></span>' : ''}Tafel ${nr}</button>`;
    }).join('');
    const vid = STREAMS[String(STREAM_SEL)] || null;
    if (vid !== STREAM_VID_GETOOND) {
      STREAM_VID_GETOOND = vid;
      document.getElementById('streamvideo').innerHTML = vid
        ? `<iframe src="https://www.youtube.com/embed/${encodeURIComponent(vid)}?autoplay=1&mute=1&vq=hd1080" title="Tafel ${STREAM_SEL} livestream" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`
        : `<div class="geenstream">Geen livestream voor Tafel ${STREAM_SEL}.</div>`;
    }
    paneel.hidden = false;
  }

  // Zet de knoppen/velden in lijn met de huidige staat (bij laden + na reset/wissel).
  function pasControlsToe() {
    document.getElementById('wStandaard').classList.toggle('aan', WEERGAVE === 'standaard');
    document.getElementById('wMinimal').classList.toggle('aan', WEERGAVE === 'minimal');
    document.getElementById('wXL').classList.toggle('aan', WEERGAVE === 'xl');
    document.body.classList.toggle('xl', WEERGAVE === 'xl');
    document.getElementById('fTafels').value = FILTERS.tafels || '';
    document.getElementById('fGepind').checked = !!FILTERS.gepind;
    document.getElementById('fAfgelopen').checked = !!FILTERS.afgelopen;
    document.getElementById('fYoutube').checked = !!FILTERS.youtube;
    const n = actieveFilters();
    const pil = document.getElementById('filterTel');
    pil.textContent = n; pil.hidden = n === 0;
    document.getElementById('filterKnop').classList.toggle('actief', n > 0);
  }

  function setWeergave(w) { WEERGAVE = w; bewaar(); pasControlsToe(); render(); }

  // Events koppelen.
  document.getElementById('zoek').addEventListener('input', render);
  document.getElementById('wStandaard').addEventListener('click', () => setWeergave('standaard'));
  document.getElementById('wMinimal').addEventListener('click', () => setWeergave('minimal'));
  document.getElementById('wXL').addEventListener('click', () => setWeergave('xl'));

  const filtersEl = document.getElementById('filters');
  document.getElementById('filterKnop').addEventListener('click', (e) => {
    const open = filtersEl.classList.toggle('open');
    e.currentTarget.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  document.getElementById('fTafels').addEventListener('input', (e) => { FILTERS.tafels = e.target.value; bewaar(); pasControlsToe(); render(); });
  document.getElementById('fGepind').addEventListener('change', (e) => { FILTERS.gepind = e.target.checked; bewaar(); pasControlsToe(); render(); });
  document.getElementById('fAfgelopen').addEventListener('change', (e) => { FILTERS.afgelopen = e.target.checked; bewaar(); pasControlsToe(); render(); });
  document.getElementById('fYoutube').addEventListener('change', (e) => { FILTERS.youtube = e.target.checked; bewaar(); pasControlsToe(); render(); });
  document.getElementById('fReset').addEventListener('click', () => {
    FILTERS = { tafels: '', afgelopen: false, youtube: false, gepind: false };
    bewaar(); pasControlsToe(); render();
  });

  // Pin-knoppen (📌) in de standen: klik = tafel vastpinnen/losmaken.
  document.getElementById('inhoud').addEventListener('click', (e) => {
    const b = e.target.closest('button.pin');
    if (!b) return;
    togglePin(b.dataset.tafel);
  });

  // Livestream-tabs: klik = andere tafel tonen.
  document.getElementById('streamtabs').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-nr]');
    if (!b) return;
    STREAM_SEL = Number(b.dataset.nr);
    renderStream();
  });

  pasControlsToe();
  renderStream();
  laad();
  setInterval(laad, REFRESH_MS);
</script>
</body>
</html>
