<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Mokum Live</title>
<!-- Hoe lang deze kaart in beeld blijft; gen-pauze-slides.mjs leest dit uit. -->
<meta name="pauze-seconden" content="10">
<style>
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: #0b1220; color: #fff;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  .wrap {
    height: 100%; display: flex; align-items: center; justify-content: center;
    gap: 72px; padding: 0 80px; box-sizing: border-box;
  }
  .qr {
    background: #fff; border-radius: 24px; padding: 24px; line-height: 0;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  /* De QR is een kleine PNG die we opschalen. `pixelated` houdt de blokjes
     kraakhelder — met gladstrijken wordt een QR juist slechter leesbaar. */
  .qr img { width: 380px; height: 380px; display: block; image-rendering: pixelated; }

  .txt { max-width: 720px; }
  .kicker {
    font-size: 26px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    color: #f87171; margin-bottom: 10px;
  }
  .title { font-size: 82px; font-weight: 800; line-height: 1.02; letter-spacing: -1px; }
  .sub { font-size: 34px; color: #cbd5e1; margin-top: 18px; line-height: 1.35; }
  .hint {
    font-size: 28px; color: #34d399; font-weight: 700; margin-top: 32px;
    display: flex; align-items: center; gap: 12px;
  }
  .url {
    margin-top: 26px; font-size: 24px; color: #64748b;
    border-top: 1px solid rgba(255,255,255,.10); padding-top: 18px;
  }
</style>
