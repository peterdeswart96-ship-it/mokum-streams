<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Live in de zaal</title>
<!-- 40s in het deck = ruimte voor beide pagina's (elk 20s) als er >8 live tafels zijn. -->
<meta name="pauze-seconden" content="40">
<meta name="pauze-fullbleed" content="1">
<style>
  /* Eigen Mokum-tafelraster (#54) — vervangt de Cuescore-jumbotron. Toont alléén
     LIVE wedstrijden over een zaalfoto, huisstijl zwart/rood + Arial Black. */
  :root {
    --brand: #cc0000;
    --brand-light: #ff6b6b;
    --ink: #ffffff;
    --ink-muted: #cfcfcf;
  }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0a0a; color: var(--ink);
    font-family: Arial, Helvetica, sans-serif; }

  /* Achtergrond: zaalfoto met donkere sluier. Ontbreekt de foto, dan blijft de
     gradiënt over (geen kapot beeld op de stream). */
  .bg {
    position: absolute; inset: 0; z-index: 0;
    background-image:
      linear-gradient(180deg, rgba(10,10,10,.72), rgba(10,10,10,.82)),
      url('../img/jumbotron-bg.jpg'),
      linear-gradient(160deg, #12161d, #0a0d11);
    background-size: cover; background-position: center;
  }

  .kop {
    position: relative; z-index: 1;
    height: 96px; box-sizing: border-box;
    display: flex; align-items: center; gap: 20px; padding: 0 44px;
    background: linear-gradient(180deg, rgba(204,0,0,.34), rgba(10,10,10,0));
    border-bottom: 2px solid var(--brand);
  }
  .kop img.logo { height: 54px; width: auto; }
  .kop h1 { font-family: "Arial Black", Arial, sans-serif; font-size: 36px; margin: 0; letter-spacing: -.5px;
    text-shadow: 0 2px 10px rgba(0,0,0,.6); }
  .kop .telling { margin-left: auto; font-size: 24px; color: var(--ink-muted); }
  .kop .telling b { color: var(--brand-light); font-family: "Arial Black", Arial, sans-serif; }
  .kop .pagina { margin-left: 18px; font-size: 20px; color: #9a9a9a; }

  #raster {
    position: relative; z-index: 1;
    height: calc(100% - 96px); box-sizing: border-box; padding: 26px 44px;
    display: grid; gap: 18px; grid-auto-rows: 1fr; align-content: stretch;
    /* aantal kolommen wordt in JS gezet (schaalt met het aantal tafels) */
  }
  .cel {
    background: rgba(14,14,16,.82); border: 1px solid var(--brand);
    border-radius: 14px; padding: 18px 24px; backdrop-filter: blur(2px);
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
    display: flex; flex-direction: column; justify-content: center; min-height: 0;
  }
  .celkop { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .tafel { font-family: "Arial Black", Arial, sans-serif; font-size: 30px; }
  .ronde { font-size: 17px; color: #9a9a9a; }
  .badge { margin-left: auto; font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 4px 14px; border-radius: 999px; background: var(--brand); color: #fff; }

  .speler { display: flex; align-items: center; gap: 18px; font-size: 30px; line-height: 1.2; }
  .speler + .speler { margin-top: 16px; }
  /* Grote spelersfoto (4× t.o.v. de eerste versie) → echte jumbotron-uitstraling. */
  .foto { width: 110px; height: 110px; border-radius: 50%; flex-shrink: 0; object-fit: cover;
    background: #333; border: 2px solid #444; }
  .vlag { width: 40px; height: 27px; flex-shrink: 0; border-radius: 2px; object-fit: cover; }
  .naam { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .score { font-family: "Arial Black", Arial, sans-serif; font-size: 38px; min-width: 62px; text-align: center;
    background: var(--brand); border-radius: 10px; padding: 4px 16px; font-variant-numeric: tabular-nums; }

  #leeg { position: relative; z-index: 1; height: calc(100% - 96px); display: flex; align-items: center;
    justify-content: center; color: #cfcfcf; font-size: 30px; text-shadow: 0 2px 10px rgba(0,0,0,.7); }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="kop">
    <img class="logo" src="/mokum-logo.png" alt="">
    <h1>Live in de zaal</h1>
    <div class="telling" id="telling"></div>
    <div class="pagina" id="pagina"></div>
  </div>
  <div id="raster"></div>
  <div id="leeg" hidden>Op dit moment geen live wedstrijden</div>

<script>
// Toont alléén LIVE wedstrijden uit onze eigen /api/live (venueTables), over een
// zaalfoto. Max 8 tafels per scherm; bij meer wisselt 'ie elke 20s tussen pagina's (#54).
const APP_API = 'https://mokum-streams-func.azurewebsites.net';
const REFRESH_MS = 15000;  // hoe vaak we de data verversen
const PER_PAGE = 8;        // max tafels per scherm
const PAGE_MS = 20000;     // 20s per scherm bij >8 tafels

let liveTafels = [];
let pagina = 0;

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => (
  { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]
));

function celHtml(t) {
  const ronde = t.round ? `<span class="ronde">${esc(t.round)}</span>` : '';
  const foto = (p) => (p && p.image
    ? `<img class="foto" src="${esc(p.image)}" alt="" onerror="this.removeAttribute('src')">`
    : '<span class="foto"></span>');
  const vlag = (p) => (p && p.flag ? `<img class="vlag" src="${esc(p.flag)}" alt="">` : '');
  const speler = (p, score) => `
    <div class="speler">${foto(p)}${vlag(p)}<span class="naam">${esc((p && p.name) || '—')}</span>
      <span class="score">${score == null ? '' : esc(score)}</span></div>`;
  return `
    <div class="cel">
      <div class="celkop"><span class="tafel">Tafel ${esc(t.table)}</span>${ronde}<span class="badge">Live</span></div>
      ${speler(t.playerA, t.scoreA)}
      ${speler(t.playerB, t.scoreB)}
    </div>`;
}

// Kolommen schalen met het aantal tafels op dit scherm: weinig tafels → brede kaarten
// met grote foto's; richting 8 → 4 kolommen (2 rijen) zodat alles past.
function kolommenVoor(n) {
  if (n <= 2) return n || 1;
  if (n <= 4) return 2;
  if (n <= 6) return 3;
  return 4;
}

function teken() {
  const raster = document.getElementById('raster');
  const leeg = document.getElementById('leeg');
  const telling = document.getElementById('telling');
  const paginaEl = document.getElementById('pagina');

  const totaal = liveTafels.length;
  const paginas = Math.max(1, Math.ceil(totaal / PER_PAGE));
  if (pagina >= paginas) pagina = 0;

  telling.innerHTML = totaal ? `<b>${totaal}</b> nu live` : '';
  paginaEl.textContent = paginas > 1 ? `scherm ${pagina + 1}/${paginas}` : '';

  if (!totaal) { raster.hidden = true; leeg.hidden = false; return; }
  leeg.hidden = true; raster.hidden = false;

  const deze = liveTafels.slice(pagina * PER_PAGE, pagina * PER_PAGE + PER_PAGE);
  raster.style.gridTemplateColumns = `repeat(${kolommenVoor(deze.length)}, 1fr)`;
  raster.innerHTML = deze.map(celHtml).join('');
}

async function ververs() {
  try {
    const r = await fetch(`${APP_API}/api/live`, { cache: 'no-store' });
    const d = await r.json();
    const alle = Array.isArray(d.venueTables) ? d.venueTables : [];
    liveTafels = alle.filter((t) => String(t.status || '').toLowerCase() === 'playing');
    teken();
  } catch (e) {
    // Netwerkfout → vorige beeld laten staan (geen lege flits op de stream).
  }
}

ververs();
setInterval(ververs, REFRESH_MS);
setInterval(() => { pagina += 1; teken(); }, PAGE_MS); // wissel van scherm bij >8 tafels
</script>
</body>
</html>
