<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Live in de zaal</title>
<!-- Fullbleed pauze-kaart; lang genoeg om meerdere tafels te laten rouleren. -->
<meta name="pauze-seconden" content="40">
<meta name="pauze-fullbleed" content="1">
<style>
  /* Eigen Mokum-jumbotron (#54) — ontwerp van Peter (Claude design): één tafelkaart
     tegelijk, schuift van rechts naar het midden, over de zaalfoto. Huisstijl zwart/rood
     + Arial Black. Data uit onze eigen /api/live (venueTables). */
  html, body {
    margin: 0; padding: 0; width: 1920px; height: 1080px; overflow: hidden;
    background: #000; color: #fff; font-family: 'Arial Black', Arial, sans-serif;
  }
  .bg {
    position: absolute; inset: 0; z-index: 0;
    background-image:
      linear-gradient(180deg, rgba(0,0,0,0.62) 0%, rgba(0,0,0,0.45) 40%, rgba(0,0,0,0.72) 100%),
      url('../img/jumbotron-bg.jpg'),
      linear-gradient(160deg, #12161d, #0a0d11);
    /* De foto is bij de bron symmetrisch bijgesneden (links 164px eraf) zodat MOKUM
       gecentreerd staat en de tafels gelijk zijn. 100% 100% toont de hele foto. */
    background-size: 100% 100%, 100% 100%, cover;
    background-position: center;
  }

  .stage { position: absolute; inset: 0; z-index: 1; overflow: hidden; }

  /* Kaart gecentreerd via marges (zodat de transform vrij is voor de slide-animatie). */
  .card {
    /* Verticaal in de bar-zone (tussen het MOKUM-bord en de tafels), niet dood-gecentreerd. */
    position: absolute; left: 50%; top: 44%;
    width: 1040px; height: 520px; margin-left: -520px; margin-top: -260px;
    box-sizing: border-box; padding: 40px 52px 44px;
    background: rgba(8,8,8,0.78); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    display: flex; flex-direction: column; gap: 26px;
  }
  .card.in  { animation: cardIn  0.75s cubic-bezier(0.22, 0.9, 0.3, 1) forwards; }
  /* De oude kaart faded snel weg (i.p.v. 0,9s naar links te schuiven), zodat er nooit
     twee kaarten tegelijk in het midden staan → vloeiende wissel. */
  .card.out { animation: cardOut 0.3s ease forwards; }
  @keyframes cardIn  { from { transform: translateX(1300px); } to { transform: translateX(0); } }
  @keyframes cardOut { from { opacity: 1; } to { opacity: 0; transform: translateX(-40px); } }

  /* Ticker (#65): vrije berichtenbalk in de middengang tussen de twee tafels, ónder de
     kaart — mag de tafels op de achtergrondfoto niet overlappen. Geen label, alleen
     scrollende tekst. Maten staan als variabelen zodat ze in OBS bij te stellen zijn
     (ook live via ?tickerTop= / ?tickerBreedte= / ?tickerHoogte= / ?tickerSnelheid=). */
  :root {
    --ticker-top: 760px;
    --ticker-breedte: 640px;
    --ticker-hoogte: 56px;
  }
  .ticker {
    position: absolute; z-index: 2;
    left: 50%; top: var(--ticker-top);
    width: var(--ticker-breedte); margin-left: calc(var(--ticker-breedte) / -2);
    height: var(--ticker-hoogte);
    overflow: hidden;
    display: flex; align-items: center;
    background: rgba(8,8,8,0.72);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.45);
    /* Randen zacht laten uitvloeien, zodat tekst niet hard afgekapt in/uit beeld schuift. */
    -webkit-mask-image: linear-gradient(90deg, transparent 0, #000 48px, #000 calc(100% - 48px), transparent 100%);
            mask-image: linear-gradient(90deg, transparent 0, #000 48px, #000 calc(100% - 48px), transparent 100%);
  }
  .ticker[hidden] { display: none; }
  .ticker .spoor {
    display: inline-flex; flex: none; white-space: nowrap; will-change: transform;
    animation: tickerLoop linear infinite;
  }
  /* Het spoor bevat de reeks twee keer; we schuiven precies één reeks op → naadloze lus. */
  @keyframes tickerLoop {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(var(--afstand, 0) * -1px)); }
  }
  .ticker .item {
    font-family: Arial, sans-serif; font-weight: bold;
    font-size: 24px; letter-spacing: 0.4px;
    color: rgba(255,255,255,0.92);
    padding: 0 34px;
    display: inline-flex; align-items: center; gap: 34px;
  }
  .ticker .item::after {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: #cc0000; flex: none;
  }

  .kop { display: flex; align-items: center; gap: 22px; }
  .tafel { font-size: 58px; line-height: 1; }
  .ronde { font-family: Arial, sans-serif; font-size: 26px; color: rgba(255,255,255,0.6); }
  .badge {
    margin-left: auto; display: flex; align-items: center; gap: 12px;
    background: #cc0000; color: #fff; padding: 10px 22px; border-radius: 999px; font-size: 26px;
  }
  .badge .stip { width: 14px; height: 14px; border-radius: 50%; background: #fff; animation: livePulse 1.4s ease-in-out infinite; }
  @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

  .spelers { display: flex; flex-direction: column; gap: 16px; flex: 1; justify-content: center; }
  .speler {
    display: flex; align-items: center; gap: 26px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 18px 26px;
  }
  .avatar {
    width: 86px; height: 86px; border-radius: 50%; flex-shrink: 0; object-fit: cover;
    background: #3a4a5a; border: 3px solid rgba(255,255,255,0.25);
  }
  .vlag {
    width: 52px; height: 36px; flex-shrink: 0; object-fit: cover; border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .naam { flex: 1; font-size: 40px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .score {
    width: 110px; height: 86px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    background: #cc0000; color: #fff; font-size: 52px; border-radius: 12px;
    box-shadow: 0 6px 20px rgba(204,0,0,0.4); font-variant-numeric: tabular-nums;
  }

  #leeg {
    position: absolute; inset: 0; z-index: 1; display: flex; align-items: center; justify-content: center;
    font-family: Arial, sans-serif; font-size: 34px; color: rgba(255,255,255,0.7);
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  }
  /* Cruciaal: laat de hidden-stand winnen van de display:flex hierboven (anders bleef
     de "geen live wedstrijden"-melding altijd zichtbaar, ook onder een kaart). */
  #leeg[hidden] { display: none; }

  /* --- Promo-poster (#54): om de 120s even tonen met een gordijn-overgang --- */
  .poster {
    position: absolute; inset: 0; z-index: 3; background: #000;
    display: flex; align-items: center; justify-content: center;
  }
  .poster[hidden] { display: none; }
  .poster img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }

  /* Theatergordijn: twee rood-fluwelen panelen die dichtschuiven en weer open. */
  .curtain { position: absolute; inset: 0; z-index: 5; pointer-events: none; overflow: hidden; }
  .curtain .panel {
    position: absolute; top: 0; bottom: 0; width: 51%;
    /* Fluweel: verticale plooien (lichte/donkere rode banden) + randschaduw. */
    background:
      linear-gradient(90deg, rgba(0,0,0,0.55), rgba(0,0,0,0) 10%, rgba(0,0,0,0) 90%, rgba(0,0,0,0.55)),
      repeating-linear-gradient(90deg, #6c0d0d 0, #a11616 26px, #560808 52px, #6c0d0d 78px);
    box-shadow: inset 0 0 120px rgba(0,0,0,0.6);
    transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1);
  }
  .curtain .left  { left: 0;  transform: translateX(-100%); }   /* open = uit beeld links */
  .curtain .right { right: 0; transform: translateX(100%); }    /* open = uit beeld rechts */
  .curtain.dicht .left  { transform: translateX(0); }
  .curtain.dicht .right { transform: translateX(0); }

  /* ============ Podium-eindscherm (winnaar-moment #54) ============ */
  .podium {
    position: absolute; inset: 0; z-index: 2;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    /* Onderaan uitlijnen zodat de "MOKUM"-tekst bovenin de achtergrond vrij leesbaar blijft. */
    gap: 26px; padding: 40px 40px 70px;
  }
  .podium[hidden] { display: none; }
  .podiumTitel { text-align: center; text-shadow: 0 4px 24px rgba(0,0,0,0.85); }
  .podiumTitel .groot { font-size: 78px; line-height: 1; letter-spacing: 1px; }
  .podiumTitel .sub {
    display: block; margin-top: 14px; font-family: Arial, sans-serif; font-weight: bold;
    font-size: 30px; color: #f4c430; text-transform: uppercase; letter-spacing: 4px;
  }

  .podiumRij { display: flex; align-items: flex-end; justify-content: center; gap: 46px; }
  .plek { display: flex; flex-direction: column; align-items: center; width: 300px; position: relative; }
  .kroon { font-size: 66px; line-height: 1; margin-bottom: 6px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6)); animation: zweef 2.6s ease-in-out infinite; }
  @keyframes zweef { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-12px) rotate(4deg); } }

  .pfoto {
    width: 160px; height: 160px; border-radius: 50%; object-fit: cover;
    border: 6px solid var(--rand, #888); background: #2a3542;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  .plek.winner .pfoto {
    width: 200px; height: 200px;
    box-shadow: 0 0 70px rgba(244,196,48,0.75), 0 12px 40px rgba(0,0,0,0.6);
    animation: gloed 2.2s ease-in-out infinite;
  }
  @keyframes gloed {
    0%,100% { box-shadow: 0 0 60px rgba(244,196,48,0.6), 0 12px 40px rgba(0,0,0,0.6); }
    50% { box-shadow: 0 0 100px rgba(244,196,48,0.95), 0 12px 40px rgba(0,0,0,0.6); }
  }
  .pnaam {
    margin-top: 18px; font-size: 34px; max-width: 290px; text-align: center;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .plek.winner .pnaam { font-size: 40px; color: #f7d55a; }
  .pvlag {
    width: 46px; height: 31px; margin-top: 10px; object-fit: cover; border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.35); box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .podest {
    margin-top: 22px; width: 100%;
    background: linear-gradient(180deg, #1a2740, #0c1322);
    border: 1px solid rgba(255,255,255,0.1); border-top: 5px solid var(--rand, #888);
    border-radius: 10px 10px 0 0; box-shadow: inset 0 8px 30px rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
  }
  .pnum { font-size: 120px; line-height: 1; color: var(--rand, #888); text-shadow: 0 4px 20px rgba(0,0,0,0.6); }

  /* Laserstralen: dunne gekleurde balken die vanuit de twee bovenhoeken de zaal in
     sweepen (screen-blend). Links-boven waaiert naar rechtsonder, rechts-boven naar
     linksonder. */
  .lasers { position: absolute; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
  .lasers[hidden] { display: none; }
  .lasers .beam {
    position: absolute; top: 0; width: 2100px; height: 5px;
    mix-blend-mode: screen; opacity: 0.55; border-radius: 3px;
    filter: blur(0.5px) drop-shadow(0 0 8px var(--laser, #cc0000));
    animation: sweep var(--dur, 7s) ease-in-out infinite alternate;
  }
  .lasers .beam.links {
    left: 0; transform-origin: left center;
    background: linear-gradient(90deg, var(--laser, #cc0000) 0%, rgba(0,0,0,0) 78%);
  }
  .lasers .beam.rechts {
    right: 0; transform-origin: right center;
    background: linear-gradient(270deg, var(--laser, #cc0000) 0%, rgba(0,0,0,0) 78%);
  }
  @keyframes sweep { from { transform: rotate(var(--van, 15deg)); } to { transform: rotate(var(--tot, 60deg)); } }

  .confetti { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
  .confetti[hidden] { display: none; }

  @media (prefers-reduced-motion: reduce) {
    .card.in, .card.out, .curtain .panel { animation: none; transition: none; }
    .kroon, .plek.winner .pfoto, .lasers .beam { animation: none; }
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="stage" id="stage"></div>
  <div id="leeg" hidden>Op dit moment geen live wedstrijden</div>

  <!-- Ticker (#65): scrollende berichtenbalk in de middengang, onder de kaart. -->
  <div class="ticker" id="ticker" hidden><div class="spoor" id="tickerSpoor"></div></div>

  <!-- Podium-eindscherm (winnaar-moment #54): laserstralen achter, podium in het midden, confetti ervoor. -->
  <div class="lasers" id="lasers" hidden>
    <!-- Linksboven → waaiert naar rechtsonder (positieve hoeken). -->
    <span class="beam links"  style="--laser:#cc0000; --van:12deg; --tot:40deg; --dur:6.5s"></span>
    <span class="beam links"  style="--laser:#f4c430; --van:26deg; --tot:56deg; --dur:8s"></span>
    <span class="beam links"  style="--laser:#19c3ff; --van:44deg; --tot:74deg; --dur:7.2s"></span>
    <!-- Rechtsboven → waaiert naar linksonder (negatieve hoeken). -->
    <span class="beam rechts" style="--laser:#ff2fd0; --van:-12deg; --tot:-40deg; --dur:9s"></span>
    <span class="beam rechts" style="--laser:#38ff8e; --van:-26deg; --tot:-56deg; --dur:7.8s"></span>
    <span class="beam rechts" style="--laser:#f4c430; --van:-44deg; --tot:-74deg; --dur:6.8s"></span>
  </div>
  <div class="podium" id="podium" hidden>
    <div class="podiumTitel"><span class="sub" id="podiumSub"></span></div>
    <div class="podiumRij" id="podiumRij"></div>
  </div>
  <canvas class="confetti" id="confetti" width="1920" height="1080" hidden></canvas>

  <div class="poster" id="poster" hidden><img src="../img/poster-10ball.png" alt="Mokum 10-ball Summer Break"></div>
  <div class="curtain" id="curtain"><div class="panel left"></div><div class="panel right"></div></div>

<script>
// Toont live wedstrijden uit onze eigen /api/live (venueTables), één tafelkaart tegelijk,
// die van rechts inschuift. Rouleert door alle live tafels (#54).
const APP_API = 'https://mokum-streams-func.azurewebsites.net';
const REFRESH_MS = 15000; // data verversen
const CARD_MS = 6000;     // hoe lang elke tafelkaart in beeld blijft

let liveTafels = [];
let idx = 0;
let huidigeKey = null; // welke tafel nu in beeld staat (om onnodig herbouwen te voorkomen)

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => (
  { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]
));

function spelerHtml(p, score) {
  const avatar = p && p.image
    ? `<img class="avatar" src="${esc(p.image)}" alt="" onerror="this.removeAttribute('src')">`
    : '<span class="avatar"></span>';
  const vlag = p && p.flag ? `<img class="vlag" src="${esc(p.flag)}" alt="">` : '<span class="vlag" style="visibility:hidden"></span>';
  return `
    <div class="speler">
      ${avatar}${vlag}
      <span class="naam">${esc((p && p.name) || '—')}</span>
      <span class="score">${score == null ? '' : esc(score)}</span>
    </div>`;
}

function kaartHtml(t) {
  const ronde = t.round ? `<span class="ronde">${esc(t.round)}</span>` : '';
  return `
    <div class="kop">
      <span class="tafel">Tafel ${esc(t.table)}</span>${ronde}
      <span class="badge"><span class="stip"></span>LIVE</span>
    </div>
    <div class="spelers">
      ${spelerHtml(t.playerA, t.scoreA)}
      ${spelerHtml(t.playerB, t.scoreB)}
    </div>`;
}

function toon(t) {
  const stage = document.getElementById('stage');
  const nieuw = document.createElement('div');
  nieuw.className = 'card in';
  nieuw.innerHTML = kaartHtml(t);

  // Vorige kaart naar links uitschuiven en daarna opruimen.
  const oud = stage.querySelector('.card:not(.out)');
  if (oud) {
    oud.classList.remove('in');
    oud.classList.add('out');
    oud.addEventListener('animationend', () => oud.remove(), { once: true });
  }
  stage.appendChild(nieuw);
  document.getElementById('leeg').hidden = true; // nooit de leeg-melding onder een kaart
  huidigeKey = t.table;
}

// Volgende live tafel tonen (rouleren). Bij 0 → "geen live wedstrijden".
function volgende() {
  if (posterBezig || podiumActief) return; // niet rouleren achter de poster of het podium
  const leeg = document.getElementById('leeg');
  const stage = document.getElementById('stage');
  if (!liveTafels.length) {
    leeg.hidden = false; stage.innerHTML = ''; huidigeKey = null; return;
  }
  leeg.hidden = true;
  if (idx >= liveTafels.length) idx = 0;
  const t = liveTafels[idx];
  idx += 1;
  // Bij één tafel niet steeds opnieuw inschuiven als 'ie al staat.
  if (liveTafels.length === 1 && huidigeKey === t.table && stage.querySelector('.card')) {
    // alleen de standen verversen zonder animatie
    stage.querySelector('.card').innerHTML = kaartHtml(t);
    return;
  }
  toon(t);
}

let leegTeller = 0; // aantal opeenvolgende ophaal-rondes zonder live tafels (debounce)

async function ververs() {
  try {
    const r = await fetch(`${APP_API}/api/live`, { cache: 'no-store' });
    const d = await r.json();
    const alle = Array.isArray(d.venueTables) ? d.venueTables : [];
    const nieuw = alle.filter((t) => String(t.status || '').toLowerCase() === 'playing');
    if (nieuw.length) {
      leegTeller = 0;
      liveTafels = nieuw;
    } else {
      // Niet meteen "geen live" tonen bij een kort momentje zonder wedstrijd (bijv.
      // tussen twee racks); pas na 2 lege rondes de kaart loslaten.
      leegTeller += 1;
      if (leegTeller >= 2) liveTafels = [];
    }
    // Podium (winnaar-moment): in demo-modus altijd de demo, anders wat de backend geeft.
    updatePodium(DEMO ? demoPodium : (d.podium || null));
    zetTicker(d.ticker);
  } catch (e) {
    /* netwerkfout → vorige beeld laten staan */
  }
}

// ============ Ticker (#65) ============
// Vrije berichtenbalk onderin: aankondigingen, sponsors, wat er die avond speelt. Bewust
// géén scores — die staan al in de tafelkaart. De regels komen mee in /api/live (veld
// `ticker`), dus geen extra verzoek; de backend zorgt dat er altijd minstens één regel is.
const TICKER_STANDAARD = ['Waiting for next match...'];
const tickerEl = document.getElementById('ticker');
const tickerSpoor = document.getElementById('tickerSpoor');
let tickerNu = ''; // laatst getoonde inhoud (om niet elke poll opnieuw te bouwen)

// Maten in OBS bijstellen zonder deploy: ?tickerTop=780&tickerBreedte=700&tickerHoogte=60
const zoek = new URLSearchParams(location.search);
const TICKER_SNELHEID = Number(zoek.get('tickerSnelheid')) || 70; // px per seconde
for (const [param, css] of [['tickerTop', '--ticker-top'], ['tickerBreedte', '--ticker-breedte'], ['tickerHoogte', '--ticker-hoogte']]) {
  const v = Number(zoek.get(param));
  if (Number.isFinite(v) && v > 0) document.documentElement.style.setProperty(css, `${v}px`);
}

function zetTicker(regels) {
  const lijst = Array.isArray(regels) && regels.length ? regels : TICKER_STANDAARD;
  const sleutel = lijst.join('');
  if (sleutel === tickerNu) return; // ongewijzigd → de lopende animatie niet onderbreken
  tickerNu = sleutel;

  const reeks = lijst.map((r) => `<span class="item">${esc(r)}</span>`).join('');
  tickerSpoor.innerHTML = reeks;
  tickerEl.hidden = false;

  // Korte reeksen herhalen tot ze breder zijn dan de balk, anders ontstaat er een gat
  // in de lus. Daarna één extra kopie: precies die breedte schuiven we op.
  let veiligheid = 20;
  while (tickerSpoor.scrollWidth > 0 && tickerSpoor.scrollWidth < tickerEl.clientWidth && veiligheid-- > 0) {
    tickerSpoor.insertAdjacentHTML('beforeend', reeks);
  }
  const afstand = tickerSpoor.scrollWidth;
  tickerSpoor.insertAdjacentHTML('beforeend', tickerSpoor.innerHTML);
  tickerSpoor.style.setProperty('--afstand', afstand);
  tickerSpoor.style.animationDuration = `${Math.max(6, afstand / TICKER_SNELHEID)}s`;
}

// ============ Podium-eindscherm (winnaar-moment #54) ============
// Toont na de finale (niemand meer aan tafel) een medaillescherm met de Cuescore-
// spelersfoto's, confetti en laserstralen. Winnaar (1e) krijgt extra: kroon + gouden
// gloed + gouden confetti. Demo-modus met ?demo of ?podium (voor OBS-test / aan Mark
// laten zien) toont een voorbeeldpodium met echte foto's.
const DEMO = /[?&](demo|podium)\b/.test(location.search);
const demoPodium = {
  tournamentName: 'Mokum 8 & 10ball Ranking (10ball) #19',
  podium: [
    { positie: 1, medaille: 'goud',   speler: { name: 'Umut Sarkas', image: 'https://img.cuescore.com/image/d/4/ddf09df16c439b742ce1ec3dda06f0de.png?t=1781888546', flag: 'https://cuescore.com/img/flags/png-country-4x2-none/res-640x480/nl.png' } },
    { positie: 2, medaille: 'zilver', speler: { name: 'Danny Bast',  image: 'https://img.cuescore.com/image/8/4/84d07f5dcd663a4c69840f57aa5828b1.png?t=1731743668', flag: 'https://cuescore.com/img/flags/png-country-4x2-none/res-640x480/nl.png' } },
    { positie: 3, medaille: 'brons',  speler: { name: 'Jun Torres',  image: 'https://img.cuescore.com/image/8/4/862c792ba8eb7f97e626fbe6cbcc59f6.png', flag: 'https://cuescore.com/img/flags/png-country-4x2-none/res-640x480/nl.png' } },
    { positie: 3, medaille: 'brons',  speler: { name: 'Mattias B',   image: 'https://img.cuescore.com/image/f/4/fb0490ea3bdaba5c7989a41d7f710d8f.png?t=1743937005', flag: 'https://cuescore.com/img/flags/png-country-4x2-none/res-640x480/nl.png' } },
  ],
};

const MEDAILLE = {
  goud:   { kleur: '#f4c430', hoogte: 250 },
  zilver: { kleur: '#cbd5e1', hoogte: 190 },
  brons:  { kleur: '#cd7f32', hoogte: 140 },
};

let podiumActief = false;
let vorigePodiumSleutel = null; // om niet elke 15s opnieuw te renderen/confetti te herstarten

function plekHtml(p) {
  const m = MEDAILLE[p.medaille] || MEDAILLE.brons;
  const s = p.speler || {};
  const foto = s.image
    ? `<img class="pfoto" src="${esc(s.image)}" alt="" onerror="this.removeAttribute('src')">`
    : '<span class="pfoto"></span>';
  const vlag = s.flag ? `<img class="pvlag" src="${esc(s.flag)}" alt="">` : '';
  const kroon = p.positie === 1 ? '<div class="kroon">👑</div>' : '';
  return `
    <div class="plek ${esc(p.medaille)}${p.positie === 1 ? ' winner' : ''}" style="--rand:${m.kleur}">
      ${kroon}${foto}
      <div class="pnaam">${esc(s.name || '—')}</div>${vlag}
      <div class="podest" style="height:${m.hoogte}px"><span class="pnum">${esc(p.positie)}</span></div>
    </div>`;
}

function renderPodium(data) {
  const lijst = (data && data.podium) || [];
  const goud = lijst.find((x) => x.positie === 1);
  const zilver = lijst.find((x) => x.positie === 2);
  const brons = lijst.filter((x) => x.positie === 3);
  // Volgorde: zilver links, goud in het midden, brons rechts (klassiek podium).
  const volgorde = [zilver, goud, ...brons].filter(Boolean);
  document.getElementById('podiumRij').innerHTML = volgorde.map(plekHtml).join('');
  document.getElementById('podiumSub').textContent = (data && data.tournamentName) || '';
}

function updatePodium(data) {
  const heeft = !!(data && Array.isArray(data.podium) && data.podium.length);
  const podium = document.getElementById('podium');
  const lasers = document.getElementById('lasers');
  const canvas = document.getElementById('confetti');

  if (!heeft) {
    if (podiumActief) { // net afgelopen → alles opruimen
      podiumActief = false;
      podium.hidden = true; lasers.hidden = true; canvas.hidden = true;
      tickerEl.hidden = false; // ticker weer terug na het medaillescherm (#65)
      stopConfetti();
      document.getElementById('stage').innerHTML = ''; huidigeKey = null;
      vorigePodiumSleutel = null;
    }
    return;
  }

  // Sleutel = namen + posities; alleen bij een echte wijziging opnieuw opbouwen.
  const sleutel = data.podium.map((p) => `${p.positie}:${(p.speler && p.speler.name) || ''}`).join('|');
  if (podiumActief && sleutel === vorigePodiumSleutel) return;
  vorigePodiumSleutel = sleutel;

  podiumActief = true;
  renderPodium(data);
  document.getElementById('leeg').hidden = true;
  document.getElementById('stage').innerHTML = ''; huidigeKey = null; // tafelkaarten weg
  podium.hidden = false; lasers.hidden = false; canvas.hidden = false;
  tickerEl.hidden = true; // medaillescherm is een moment op zich — geen ticker eroverheen
  startConfetti();
}

// --- Confetti (canvas) ---
const cvs = document.getElementById('confetti');
const cctx = cvs.getContext('2d');
const CONFETTI_KLEUREN = ['#cc0000', '#f4c430', '#ffffff', '#19c3ff', '#38ff8e', '#ff2fd0'];
let deeltjes = [];
let confettiRaf = null;
let confettiBurstTimer = null;

function voegConfettiToe(aantal, gouden) {
  for (let i = 0; i < aantal; i++) {
    deeltjes.push({
      x: Math.random() * cvs.width,
      y: -20 - Math.random() * 200,
      vx: (Math.random() - 0.5) * 3,
      vy: 3 + Math.random() * 4,
      rot: Math.random() * Math.PI,
      vr: (Math.random() - 0.5) * 0.3,
      grootte: 7 + Math.random() * 8,
      kleur: gouden ? (Math.random() < 0.7 ? '#f4c430' : '#ffffff') : CONFETTI_KLEUREN[(Math.random() * CONFETTI_KLEUREN.length) | 0],
    });
  }
}

function confettiFrame() {
  cctx.clearRect(0, 0, cvs.width, cvs.height);
  for (const p of deeltjes) {
    p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.vy += 0.04; // lichte zwaartekracht
    cctx.save();
    cctx.translate(p.x, p.y); cctx.rotate(p.rot);
    cctx.fillStyle = p.kleur;
    cctx.fillRect(-p.grootte / 2, -p.grootte / 2, p.grootte, p.grootte * 0.6);
    cctx.restore();
  }
  deeltjes = deeltjes.filter((p) => p.y < cvs.height + 30);
  confettiRaf = podiumActief ? requestAnimationFrame(confettiFrame) : null;
}

function startConfetti() {
  voegConfettiToe(160, false);      // openingsknal
  voegConfettiToe(80, true);        // extra goud voor de winnaar
  if (!confettiRaf) confettiFrame();
  // Elke paar seconden een nieuwe (kleinere) golf zodat het een minuut feestelijk blijft.
  clearInterval(confettiBurstTimer);
  confettiBurstTimer = setInterval(() => {
    if (!podiumActief) return;
    voegConfettiToe(50, false);
    voegConfettiToe(24, true);
  }, 2600);
}

function stopConfetti() {
  clearInterval(confettiBurstTimer); confettiBurstTimer = null;
  deeltjes = [];
  if (confettiRaf) { cancelAnimationFrame(confettiRaf); confettiRaf = null; }
  cctx.clearRect(0, 0, cvs.width, cvs.height);
}

// Eerste kaart meteen tonen zodra de eerste data binnen is (niet 6s wachten).
ververs().then(volgende);
setInterval(ververs, REFRESH_MS);
setInterval(volgende, CARD_MS);

// In demo-modus meteen tonen (niet op de eerste fetch wachten).
if (DEMO) updatePodium(demoPodium);

// --- Promo-poster met theatergordijn-overgang (#54) ---
// Test-stand: met ?test (of ?snel) in de URL komt de poster al na een paar seconden,
// zodat je de overgang in OBS kunt testen zonder 2 minuten te wachten. De gewone URL
// blijft 120s / 20s (productie).
const TEST = /[?&](test|snel)\b/.test(location.search);
const POSTER_INTERVAL_MS = TEST ? 18000 : 120000; // elke 2 min (test: 18s)
const POSTER_DUUR_MS = TEST ? 8000 : 10000;        // 10s tonen (test: 8s)
const GORDIJN_MS = 1000;           // duur van dicht-/openschuiven (== CSS-transition)
let posterBezig = false;
const wacht = (ms) => new Promise((r) => setTimeout(r, ms));

async function toonPoster() {
  posterBezig = true;
  const curtain = document.getElementById('curtain');
  const poster = document.getElementById('poster');
  curtain.classList.add('dicht');        // gordijn dicht
  await wacht(GORDIJN_MS);
  poster.hidden = false;                  // poster erachter klaarzetten
  tickerEl.hidden = true;                 // de poster is fullbleed → ticker eronderuit (#65)
  curtain.classList.remove('dicht');      // gordijn open → poster in beeld
  await wacht(GORDIJN_MS + POSTER_DUUR_MS);
  curtain.classList.add('dicht');         // weer dicht
  await wacht(GORDIJN_MS);
  poster.hidden = true;                   // terug naar de jumbotron
  if (!podiumActief) tickerEl.hidden = false;
  curtain.classList.remove('dicht');      // gordijn open
  await wacht(GORDIJN_MS);
  posterBezig = false;
}

// Alleen tonen als de poster-afbeelding echt bestaat (anders geen zwart vlak op de stream).
const posterImg = document.querySelector('#poster img');
let posterBeschikbaar = false;
posterImg.addEventListener('load', () => { posterBeschikbaar = true; });
posterImg.addEventListener('error', () => { posterBeschikbaar = false; });
setInterval(() => { if (!posterBezig && posterBeschikbaar && !podiumActief) toonPoster(); }, POSTER_INTERVAL_MS);
// In de test-stand meteen na een paar seconden een eerste keer, zodat je 'm snel ziet.
if (TEST) setTimeout(() => { if (posterBeschikbaar && !podiumActief) toonPoster(); }, 6000);
</script>
