<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Alle tafels in de zaal</title>
<meta name="pauze-seconden" content="15">
<!-- Deze kaart vult zelf het hele beeld; de kop van het deck valt hier weg. -->
<meta name="pauze-fullbleed" content="1">
<style>
  /* Eigen Mokum-tafelraster (#54) — vervangt de Cuescore-jumbotron, die een
     onverwijderbaar instellingenvenster afdwong. Huisstijl uit tailwind.config.js:
     zwart + #cc0000 + Arial Black. Data uit onze eigen /api/live (venueTables). */
  :root {
    --brand: #cc0000;
    --brand-light: #ff6b6b;
    --canvas: #0a0a0a;
    --surface: #1a1a1a;
    --surface-live: #2a1414;
    --ink: #ffffff;
    --ink-muted: #cccccc;
    --line: #2a2a2a;
  }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
    background: var(--canvas); color: var(--ink);
    font-family: Arial, Helvetica, sans-serif;
  }
  .kop {
    height: 92px; box-sizing: border-box;
    display: flex; align-items: center; gap: 20px;
    padding: 0 40px;
    background: linear-gradient(180deg, rgba(204,0,0,.28), rgba(10,10,10,0));
    border-bottom: 2px solid var(--brand);
  }
  .kop img { height: 52px; width: auto; }
  .kop h1 { font-family: "Arial Black", Arial, sans-serif; font-size: 34px; margin: 0; letter-spacing: -.5px; }
  .kop .telling { margin-left: auto; font-size: 22px; color: var(--ink-muted); }
  .kop .telling b { color: var(--brand-light); font-family: "Arial Black", Arial, sans-serif; }

  #raster {
    height: calc(100% - 92px); box-sizing: border-box; padding: 24px;
    display: grid; gap: 16px;
    /* Kolommen/rijen worden in JS gezet op basis van het aantal tafels. */
    grid-auto-rows: 1fr;
  }
  .cel {
    background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 20px; display: flex; flex-direction: column; justify-content: center;
    overflow: hidden;
  }
  .cel.live { background: var(--surface-live); border-color: var(--brand); }
  .cel.finished { opacity: .58; }

  .celkop { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .tafel { font-family: "Arial Black", Arial, sans-serif; font-size: 26px; }
  .badge {
    font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 999px; margin-left: auto;
  }
  .badge.live { background: var(--brand); color: #fff; }
  .badge.finished { background: #333; color: var(--ink-muted); }
  .ronde { font-size: 15px; color: #8a8a8a; }

  .speler { display: flex; align-items: center; gap: 12px; font-size: 24px; line-height: 1.25; }
  .speler + .speler { margin-top: 6px; }
  /* Spelersfoto: rond, met een subtiele rand. Valt terug op een grijze cirkel als er
     geen foto is (of de foto niet laadt). object-fit houdt gezichten net. */
  .foto {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    object-fit: cover; background: #333; border: 1px solid var(--line);
  }
  .vlag { width: 26px; height: 18px; flex-shrink: 0; border-radius: 2px; object-fit: cover; }
  .naam { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .score {
    font-family: "Arial Black", Arial, sans-serif; font-size: 28px; min-width: 44px;
    text-align: center; background: #000; border-radius: 8px; padding: 2px 10px;
    font-variant-numeric: tabular-nums;
  }
  .cel.live .score { background: var(--brand); }

  #leeg {
    height: calc(100% - 92px); display: flex; align-items: center; justify-content: center;
    color: #8a8a8a; font-size: 26px;
  }
</style>
</head>
<body>
  <div class="kop">
    <img src="/mokum-logo.png" alt="">
    <h1>Live in de zaal</h1>
    <div class="telling" id="telling"></div>
  </div>
  <div id="raster"></div>
  <div id="leeg" hidden>Geen wedstrijden op dit moment</div>

<script>
// Haalt het zaalbrede tafelraster op uit onze eigen backend (venueTables in /api/live)
// en tekent het in de Mokum-huisstijl. Geen Cuescore-UI → geen instellingenvenster (#54).
const APP_API = 'https://mokum-streams-func.azurewebsites.net';
const REFRESH_MS = 15000;

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => (
  { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]
));

function celHtml(t) {
  const live = String(t.status || '').toLowerCase() === 'playing';
  const klaar = String(t.status || '').toLowerCase() === 'finished';
  const klasse = live ? 'cel live' : (klaar ? 'cel finished' : 'cel');
  const badge = live
    ? '<span class="badge live">Live</span>'
    : (klaar ? '<span class="badge finished">Klaar</span>' : '');
  const ronde = t.round ? `<span class="ronde">${esc(t.round)}</span>` : '';
  // Foto valt terug op een grijze cirkel als 'ie ontbreekt of niet laadt (onerror).
  const foto = (p) => {
    if (p && p.image) {
      return `<img class="foto" src="${esc(p.image)}" alt="" onerror="this.removeAttribute('src')">`;
    }
    return '<span class="foto"></span>';
  };
  const vlag = (p) => (p && p.flag ? `<img class="vlag" src="${esc(p.flag)}" alt="">` : '');
  const speler = (p, score) => `
    <div class="speler">
      ${foto(p)}
      ${vlag(p)}
      <span class="naam">${esc((p && p.name) || '—')}</span>
      <span class="score">${score == null ? '' : esc(score)}</span>
    </div>`;
  return `
    <div class="${klasse}">
      <div class="celkop"><span class="tafel">Tafel ${esc(t.table)}</span>${ronde}${badge}</div>
      ${speler(t.playerA, t.scoreA)}
      ${speler(t.playerB, t.scoreB)}
    </div>`;
}

// Kies een nette kolom-indeling voor n tafels (zo vierkant mogelijk, max 4 kolommen).
function kolommenVoor(n) {
  if (n <= 1) return 1;
  if (n <= 4) return 2;
  if (n <= 9) return 3;
  return 4;
}

async function ververs() {
  const raster = document.getElementById('raster');
  const leeg = document.getElementById('leeg');
  const telling = document.getElementById('telling');
  try {
    const r = await fetch(`${APP_API}/api/live`, { cache: 'no-store' });
    const d = await r.json();
    const tafels = Array.isArray(d.venueTables) ? d.venueTables : [];
    const live = tafels.filter((t) => String(t.status || '').toLowerCase() === 'playing').length;

    telling.innerHTML = tafels.length ? `<b>${live}</b> nu live · ${tafels.length} tafels` : '';

    if (!tafels.length) {
      raster.hidden = true; leeg.hidden = false; return;
    }
    leeg.hidden = true; raster.hidden = false;
    raster.style.gridTemplateColumns = `repeat(${kolommenVoor(tafels.length)}, 1fr)`;
    raster.innerHTML = tafels.map(celHtml).join('');
  } catch (e) {
    // Netwerkfout → laat het vorige beeld staan (geen lelijke lege flits op de stream).
  }
}

ververs();
setInterval(ververs, REFRESH_MS);
</script>
</body>
</html>
