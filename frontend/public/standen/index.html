<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>Mokum Pool & Darts — Live standen</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: Arial, Helvetica, sans-serif;
    background: #0a0a0a; color: #cccccc; -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 5;
    background: #1a1a1a;
    padding: 14px 16px; border-bottom: 1px solid #2a2a2a;
  }
  header h1 { margin: 0; font-size: 18px; font-family: "Arial Black", Arial, sans-serif; letter-spacing: .2px; color: #fff; }
  header h1 .m { color: #cc0000; }
  header .sub { font-size: 12px; color: #999; margin-top: 2px; }
  main { padding: 12px 12px 40px; max-width: 640px; margin: 0 auto; }
  .melding { color: #999; text-align: center; padding: 40px 16px; font-size: 15px; }
  .sectiekop { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: #999; margin: 16px 4px 8px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #cc0000; box-shadow: 0 0 0 4px rgba(204,0,0,.2); }
  .kaart {
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .kaart.live { border-left: 3px solid #cc0000; }
  .kaart.klaar { opacity: .55; }
  .kaart .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .tafel { font-family: "Arial Black", Arial, sans-serif; font-size: 13px; background: #2a2a2a; color: #fff; border-radius: 6px; padding: 3px 9px; }
  .toernooi { font-size: 11px; color: #999; text-align: right; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rij { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .speler { font-size: 15px; font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .speler.b { text-align: right; }
  .score { font-size: 20px; font-family: "Arial Black", Arial, sans-serif; letter-spacing: 1px; white-space: nowrap; color: #fff; }
  .score .sep { color: #666; margin: 0 3px; }
  .raceto { text-align: center; font-size: 11px; color: #999; margin-top: 6px; }
  footer { text-align: center; color: #666; font-size: 11px; padding: 8px 16px 24px; }
  footer a { color: #999; }
</style>
</head>
<body>
  <header>
    <h1><span class="m">Mokum</span> Pool &amp; Darts</h1>
    <div class="sub">Live standen — alle wedstrijden in de zaal</div>
  </header>
  <main>
    <div id="inhoud"><div class="melding">Laden…</div></div>
  </main>
  <footer>Bijgewerkt <span id="ts">—</span> · standen via Cuescore</footer>

<script>
  const VENUE = 60451687;
  const REFRESH_MS = 20000;
  const API = 'https://api.cuescore.com';

  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  const num = (s) => { const n = parseInt(String(s ?? '').replace(/\D/g, ''), 10); return Number.isNaN(n) ? 9999 : n; };
  const vandaag = () => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); };

  async function haalJson(url) {
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  async function laad() {
    try {
      const ev = await haalJson(`${API}/venue/events/?venueId=${VENUE}&date=${vandaag()}`);
      const ids = Array.isArray(ev.events) ? ev.events : [];
      if (!ids.length) return toon(`<div class="melding">Vandaag geen toernooien in de zaal.</div>`);

      const toernooien = await Promise.all(
        ids.map((id) => haalJson(`${API}/tournament/?lang=nl&id=${id}`).catch(() => null))
      );
      const matches = [];
      for (const t of toernooien) {
        if (!t || !Array.isArray(t.matches)) continue;
        for (const m of t.matches) { m._toernooi = t.name || ''; matches.push(m); }
      }

      const st = (m) => String(m.matchstatus || '').toLowerCase();
      const heeftTafel = (m) => m.table && m.table.name != null && String(m.table.name).trim() !== '';
      const opTafel = (a, b) => num(a.table && a.table.name) - num(b.table && b.table.name);
      const live = matches.filter((m) => st(m) === 'playing' && heeftTafel(m)).sort(opTafel);
      const straks = matches.filter((m) => st(m) === 'waiting' && heeftTafel(m)).sort(opTafel).slice(0, 12);
      const afgelopen = matches.filter((m) => st(m) === 'finished' && heeftTafel(m))
        .sort((a, b) => tijd(b.stoptime) - tijd(a.stoptime)).slice(0, 8);

      const nu = new Date();
      document.getElementById('ts').textContent = nu.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });

      const secties = [];
      if (live.length) secties.push(sectie('Nu live', live, 'live'));
      if (straks.length) secties.push(sectie('Straks', straks, 'straks'));
      if (afgelopen.length) secties.push(sectie('Net afgelopen', afgelopen, 'klaar'));
      if (!secties.length) return toon(`<div class="melding">Nog geen wedstrijden.<br>Zodra er gespeeld wordt, verschijnen de standen hier vanzelf.</div>`);
      toon(secties.join(''));
    } catch (e) {
      toon(`<div class="melding">Kon de standen even niet laden.<br>De pagina probeert het zo opnieuw.</div>`);
    }
  }

  function tijd(iso) { const t = Date.parse(iso || ''); return Number.isNaN(t) ? 0 : t; }

  function sectie(titel, lijst, soort) {
    const dot = soort === 'live' ? '<span class="dot"></span> ' : '';
    return `<div class="sectiekop">${dot}${esc(titel)} · ${lijst.length}</div>${lijst.map((m) => kaart(m, soort)).join('')}`;
  }

  function kaart(m, soort) {
    const a = (m.playerA && m.playerA.name) || 'nog onbekend';
    const b = (m.playerB && m.playerB.name) || 'nog onbekend';
    const sa = m.scoreA != null ? m.scoreA : 0;
    const sb = m.scoreB != null ? m.scoreB : 0;
    const tafel = (m.table && m.table.name) ? `Tafel ${esc(m.table.name)}` : 'Tafel';
    const race = m.raceTo ? `Race naar ${esc(m.raceTo)}` : '';
    return `
      <div class="kaart ${esc(soort || '')}">
        <div class="top">
          <span class="tafel">${tafel}</span>
          <span class="toernooi">${esc(m._toernooi)}</span>
        </div>
        <div class="rij">
          <div class="speler">${esc(a)}</div>
          <div class="score">${esc(sa)}<span class="sep">-</span>${esc(sb)}</div>
          <div class="speler b">${esc(b)}</div>
        </div>
        ${race ? `<div class="raceto">${race}</div>` : ''}
      </div>`;
  }

  function toon(html) { document.getElementById('inhoud').innerHTML = html; }

  laad();
  setInterval(laad, REFRESH_MS);
</script>
</body>
</html>
