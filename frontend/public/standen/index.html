<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>Mokum Pool & Darts — Live standen</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a; color: #e2e8f0; -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 5;
    background: linear-gradient(180deg, #0b1220 0%, rgba(15,23,42,.96) 100%);
    padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,.08);
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: .2px; }
  header .sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  main { padding: 12px 12px 40px; max-width: 640px; margin: 0 auto; }
  .melding { color: #94a3b8; text-align: center; padding: 40px 16px; font-size: 15px; }
  .sectiekop { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: #94a3b8; margin: 16px 4px 8px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 0 4px rgba(239,68,68,.18); }
  .kaart {
    background: #1e293b; border: 1px solid rgba(255,255,255,.07); border-radius: 14px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .kaart .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .tafel { font-weight: 800; font-size: 13px; background: #334155; color: #fff; border-radius: 8px; padding: 3px 9px; }
  .toernooi { font-size: 11px; color: #94a3b8; text-align: right; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rij { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .speler { font-size: 15px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .speler.b { text-align: right; }
  .score { font-size: 20px; font-weight: 800; letter-spacing: 1px; white-space: nowrap; }
  .score .sep { color: #64748b; margin: 0 3px; }
  .raceto { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 6px; }
  footer { text-align: center; color: #64748b; font-size: 11px; padding: 8px 16px 24px; }
  footer a { color: #94a3b8; }
</style>
</head>
<body>
  <header>
    <h1>Mokum Pool &amp; Darts</h1>
    <div class="sub">Live standen — alle wedstrijden in de zaal</div>
  </header>
  <main>
    <div id="inhoud"><div class="melding">Laden…</div></div>
  </main>
  <footer>Bijgewerkt <span id="ts">—</span> · standen via Cuescore</footer>

<script>
  const VENUE = 60451687;
  const REFRESH_MS = 20000;
  const API = 'https://api.cuescore.com';

  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  const num = (s) => { const n = parseInt(String(s ?? '').replace(/\D/g, ''), 10); return Number.isNaN(n) ? 9999 : n; };
  const vandaag = () => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); };

  async function haalJson(url) {
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  async function laad() {
    try {
      const ev = await haalJson(`${API}/venue/events/?venueId=${VENUE}&date=${vandaag()}`);
      const ids = Array.isArray(ev.events) ? ev.events : [];
      if (!ids.length) return toon(`<div class="melding">Vandaag geen toernooien in de zaal.</div>`);

      const toernooien = await Promise.all(
        ids.map((id) => haalJson(`${API}/tournament/?lang=nl&id=${id}`).catch(() => null))
      );
      const matches = [];
      for (const t of toernooien) {
        if (!t || !Array.isArray(t.matches)) continue;
        for (const m of t.matches) { m._toernooi = t.name || ''; matches.push(m); }
      }

      const live = matches
        .filter((m) => String(m.matchstatus || '').toLowerCase() === 'playing' && m.table)
        .sort((a, b) => num(a.table && a.table.name) - num(b.table && b.table.name));

      const nu = new Date();
      document.getElementById('ts').textContent = nu.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });

      if (!live.length) return toon(`<div class="melding">Nog geen wedstrijden bezig.<br>Zodra er gespeeld wordt, verschijnen de standen hier vanzelf.</div>`);

      const kaarten = live.map(kaart).join('');
      toon(`<div class="sectiekop"><span class="dot"></span> Nu live · ${live.length}</div>${kaarten}`);
    } catch (e) {
      toon(`<div class="melding">Kon de standen even niet laden.<br>De pagina probeert het zo opnieuw.</div>`);
    }
  }

  function kaart(m) {
    const a = (m.playerA && m.playerA.name) || 'nog onbekend';
    const b = (m.playerB && m.playerB.name) || 'nog onbekend';
    const sa = m.scoreA != null ? m.scoreA : 0;
    const sb = m.scoreB != null ? m.scoreB : 0;
    const tafel = (m.table && m.table.name) ? `Tafel ${esc(m.table.name)}` : 'Tafel';
    const race = m.raceTo ? `Race naar ${esc(m.raceTo)}` : '';
    return `
      <div class="kaart">
        <div class="top">
          <span class="tafel">${tafel}</span>
          <span class="toernooi">${esc(m._toernooi)}</span>
        </div>
        <div class="rij">
          <div class="speler">${esc(a)}</div>
          <div class="score">${esc(sa)}<span class="sep">-</span>${esc(sb)}</div>
          <div class="speler b">${esc(b)}</div>
        </div>
        ${race ? `<div class="raceto">${race}</div>` : ''}
      </div>`;
  }

  function toon(html) { document.getElementById('inhoud').innerHTML = html; }

  laad();
  setInterval(laad, REFRESH_MS);
</script>
</body>
</html>
