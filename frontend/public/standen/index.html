<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Mokum Pool & Darts — Live standen</title>
<link rel="icon" href="/mokum-logo.png">
<link rel="apple-touch-icon" href="/mokum-logo.png">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Mokum standen">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: Arial, Helvetica, sans-serif;
    background: #0a0a0a; color: #cccccc; -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky; top: 0; z-index: 5;
    background: #1a1a1a;
    padding: 14px 16px; border-bottom: 1px solid #2a2a2a;
  }
  header h1 { margin: 0; font-size: 18px; font-family: "Arial Black", Arial, sans-serif; letter-spacing: .2px; color: #fff; }
  header h1 .m { color: #cc0000; }
  header .sub { font-size: 12px; color: #999; margin-top: 2px; }
  main { padding: 12px 12px 40px; max-width: 640px; margin: 0 auto; }
  .melding { color: #999; text-align: center; padding: 40px 16px; font-size: 15px; }
  .sectiekop { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: #999; margin: 16px 4px 8px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #cc0000; box-shadow: 0 0 0 4px rgba(204,0,0,.2); }

  /* Live-gloed: langzaam pulserende rode omlijning op wat NU speelt. */
  @keyframes gloed {
    0%, 100% { box-shadow: 0 0 0 1px #cc0000, 0 0 6px rgba(204,0,0,.30); }
    50%      { box-shadow: 0 0 0 1px #ff3b3b, 0 0 18px rgba(204,0,0,.75); }
  }
  @media (prefers-reduced-motion: reduce) { .kaart.live, .mrij.live { animation: none; } }

  /* Standaard-weergave: kaarten. Niet-live tafels krijgen géén omlijning. */
  .kaart {
    background: #1a1a1a; border: 1px solid transparent; border-radius: 10px;
    padding: 12px 14px; margin-bottom: 10px;
  }
  .kaart.live { border-color: #cc0000; animation: gloed 2.4s ease-in-out infinite; }
  .kaart.klaar { opacity: .55; }
  .kaart .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .tafel { font-family: "Arial Black", Arial, sans-serif; font-size: 13px; background: #2a2a2a; color: #fff; border-radius: 6px; padding: 3px 9px; }
  .toernooi { font-size: 11px; color: #999; text-align: right; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rij { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .speler { font-size: 15px; font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .speler.b { text-align: right; }
  .score { font-size: 20px; font-family: "Arial Black", Arial, sans-serif; letter-spacing: 1px; white-space: nowrap; color: #fff; }
  .score .sep { color: #666; margin: 0 3px; }
  .raceto { text-align: center; font-size: 11px; color: #999; margin-top: 6px; }
  .kijk {
    display: inline-block; margin-top: 8px; font-size: 12px; font-weight: bold;
    color: #ff6b6b; text-decoration: none;
  }
  .kijk:hover { color: #cc0000; }

  /* Minimal-weergave: één compacte regel per wedstrijd, gesorteerd op tafel. */
  .mrij {
    display: grid; grid-template-columns: auto 1fr auto 1fr auto; align-items: center; gap: 8px;
    background: #1a1a1a; border: 1px solid transparent; border-radius: 8px;
    padding: 8px 10px; margin-bottom: 6px;
  }
  .mrij.live { border-color: #cc0000; animation: gloed 2.4s ease-in-out infinite; }
  .mrij.klaar { opacity: .55; }
  .mrij .mt { font-family: "Arial Black", Arial, sans-serif; font-size: 12px; background: #2a2a2a; color: #fff; border-radius: 5px; padding: 2px 7px; }
  .mrij .ma { font-size: 14px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mrij .mb { font-size: 14px; color: #fff; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mrij .ms { font-size: 15px; font-family: "Arial Black", Arial, sans-serif; white-space: nowrap; color: #fff; }
  .mrij .ms .sep { color: #666; margin: 0 3px; }
  .mrij .mk { text-decoration: none; font-size: 15px; line-height: 1; }

  footer { text-align: center; color: #666; font-size: 11px; padding: 8px 16px 24px; }
  footer a { color: #999; }
  .bar { display: flex; align-items: center; gap: 12px; }
  .logo { height: 40px; width: auto; flex: none; }
  .zoek {
    width: 100%; box-sizing: border-box; margin: 4px 0 4px; padding: 10px 12px;
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
    color: #fff; font-size: 15px; font-family: inherit;
  }
  .zoek::placeholder { color: #777; }

  /* Werkbalk: filterknop links, weergave-schakelaar rechts. */
  .toolbar { display: flex; align-items: center; gap: 8px; margin: 2px 0 8px; }
  .toolbar .spacer { flex: 1; }
  .knop {
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
    color: #ccc; font: inherit; font-size: 13px; padding: 8px 11px;
  }
  .knop:hover { color: #fff; border-color: #3a3a3a; }
  .knop.actief { border-color: #cc0000; color: #fff; }
  .knop .telpil { background: #cc0000; color: #fff; border-radius: 999px; font-size: 11px; padding: 0 6px; font-weight: bold; }
  /* Segment-schakelaar (Standaard | Minimal). */
  .seg { display: inline-flex; border: 1px solid #2a2a2a; border-radius: 8px; overflow: hidden; }
  .seg button { cursor: pointer; background: #1a1a1a; border: 0; color: #999; font: inherit; font-size: 13px; padding: 8px 12px; }
  .seg button.aan { background: #cc0000; color: #fff; font-weight: bold; }

  /* Uitklapbaar filterpaneel. */
  .filters { display: none; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
  .filters.open { display: block; }
  .filters .veld { display: block; font-size: 12px; color: #999; margin: 0 0 10px; }
  .filters .veld input {
    width: 100%; box-sizing: border-box; margin-top: 5px; padding: 9px 11px;
    background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px; color: #fff; font: inherit; font-size: 15px;
  }
  .filters label { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #ccc; margin: 10px 0; cursor: pointer; }
  .filters input[type=checkbox] { width: 18px; height: 18px; accent-color: #cc0000; flex: none; }
  .filters .reset { margin-top: 6px; background: transparent; border: 1px solid #2a2a2a; color: #ff6b6b; border-radius: 8px; padding: 8px 12px; cursor: pointer; font: inherit; font-size: 13px; }
  .filters .reset:hover { border-color: #cc0000; }
</style>
</head>
<body>
  <header>
    <div class="bar">
      <img class="logo" src="/mokum-logo.png" alt="Mokum Pool & Darts">
      <div>
        <h1><span class="m">Mokum</span> Pool &amp; Darts</h1>
        <div class="sub">Live standen — alle wedstrijden in de zaal</div>
      </div>
    </div>
  </header>
  <main>
    <input id="zoek" class="zoek" type="search" placeholder="Zoek speler of tafel…" autocomplete="off">
    <div class="toolbar">
      <button id="filterKnop" class="knop" type="button" aria-expanded="false" aria-controls="filters">
        ▾ Filters <span id="filterTel" class="telpil" hidden>0</span>
      </button>
      <span class="spacer"></span>
      <div class="seg" role="group" aria-label="Weergave">
        <button id="wStandaard" type="button">Standaard</button>
        <button id="wMinimal" type="button">Minimal</button>
      </div>
    </div>
    <div id="filters" class="filters">
      <span class="veld">Toon alleen deze tafels (tafelnummers met komma's, bijv. <b>1,3,15</b>) — leeg = alle
        <input id="fTafels" type="text" inputmode="numeric" placeholder="alle tafels" autocomplete="off">
      </span>
      <label><input id="fAfgelopen" type="checkbox"> Afgelopen wedstrijden verbergen</label>
      <label><input id="fYoutube" type="checkbox"> Alleen wedstrijden die live op YouTube zijn</label>
      <button id="fReset" class="reset" type="button">Reset alle filters</button>
    </div>
    <div id="inhoud"><div class="melding">Laden…</div></div>
  </main>
  <footer>Bijgewerkt <span id="ts">—</span> · standen via Cuescore</footer>

<script>
  const VENUE = 60451687;
  const REFRESH_MS = 20000;
  const API = 'https://api.cuescore.com';
  const APP_API = 'https://mokum-streams-func.azurewebsites.net'; // onze backend (voor 'kijk live'-links)

  let ALLE = [];     // alle wedstrijden van vandaag (met _toernooi)
  let STREAMS = {};  // { "<tafelnr>": youtube-videoId } — welke tafels wij live streamen
  let GELADEN = false;

  // Weergave + filters, onthouden in de browser (localStorage).
  const LS_WEERGAVE = 'standen_weergave';
  const LS_FILTERS = 'standen_filters';
  let WEERGAVE = 'standaard'; // 'standaard' | 'minimal'
  let FILTERS = { tafels: '', afgelopen: false, youtube: false };
  try {
    const w = localStorage.getItem(LS_WEERGAVE);
    if (w === 'minimal' || w === 'standaard') WEERGAVE = w;
    const f = JSON.parse(localStorage.getItem(LS_FILTERS) || 'null');
    if (f && typeof f === 'object') FILTERS = { tafels: '', afgelopen: false, youtube: false, ...f };
  } catch (e) { /* privacymodus e.d. → gewoon standaard */ }

  function bewaar() {
    try {
      localStorage.setItem(LS_WEERGAVE, WEERGAVE);
      localStorage.setItem(LS_FILTERS, JSON.stringify(FILTERS));
    } catch (e) { /* niet fataal */ }
  }

  // Cookieloze bezoek-/QR-teller (#18 fase 1): meld één paginaweergave met de bron uit
  // utm_source (bv. 'qr' vanaf de QR-overlay). Fire-and-forget, geen cookies, geen
  // persoonsgegevens → geen consent-banner. Mag nooit de pagina blokkeren.
  (function meldBezoek() {
    try {
      const bron = new URLSearchParams(location.search).get('utm_source') || 'direct';
      const url = `${APP_API}/api/hit?source=${encodeURIComponent(bron)}&page=standen`;
      if (navigator.sendBeacon) navigator.sendBeacon(url);
      else fetch(url, { method: 'POST', mode: 'no-cors', keepalive: true });
    } catch (e) { /* teller nooit fataal */ }
  })();

  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  const num = (s) => { const n = parseInt(String(s ?? '').replace(/\D/g, ''), 10); return Number.isNaN(n) ? 9999 : n; };
  const vandaag = () => { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); };

  async function haalJson(url) {
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  async function laad() {
    try {
      // Onze eigen live-stream-info (voor de 'kijk live'-links + YouTube-filter) — mag falen.
      haalJson(`${APP_API}/api/live`).then((live) => {
        const map = {};
        for (const t of (live.tables || [])) {
          const v = t.liveVideoId || t.videoId;
          if (v) map[String(t.tableNumber)] = v;
        }
        STREAMS = map; render();
      }).catch(() => {});

      const ev = await haalJson(`${API}/venue/events/?venueId=${VENUE}&date=${vandaag()}`);
      const ids = Array.isArray(ev.events) ? ev.events : [];
      const toernooien = ids.length
        ? await Promise.all(ids.map((id) => haalJson(`${API}/tournament/?lang=nl&id=${id}`).catch(() => null)))
        : [];
      const matches = [];
      for (const t of toernooien) {
        if (!t || !Array.isArray(t.matches)) continue;
        for (const m of t.matches) { m._toernooi = t.name || ''; matches.push(m); }
      }
      ALLE = matches;
      GELADEN = true;
      document.getElementById('ts').textContent = new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
      render();
    } catch (e) {
      if (!GELADEN) toon(`<div class="melding">Kon de standen even niet laden.<br>De pagina probeert het zo opnieuw.</div>`);
    }
  }

  // Zet "1,3,15" om naar een Set van tafelnummers; leeg/ongeldig → null (= alle tafels).
  function parseTafels(s) {
    const nums = String(s || '').split(',').map((x) => parseInt(x.replace(/\D/g, ''), 10)).filter((n) => !Number.isNaN(n));
    return nums.length ? new Set(nums) : null;
  }

  const st = (m) => String(m.matchstatus || '').toLowerCase();
  const heeftTafel = (m) => m.table && m.table.name != null && String(m.table.name).trim() !== '';
  const tijd = (iso) => { const t = Date.parse(iso || ''); return Number.isNaN(t) ? 0 : t; };
  const opTafel = (a, b) => num(a.table && a.table.name) - num(b.table && b.table.name);

  // Hoeveel filters staan aan (voor het telpilletje op de filterknop).
  function actieveFilters() {
    return (FILTERS.tafels && parseTafels(FILTERS.tafels) ? 1 : 0) + (FILTERS.afgelopen ? 1 : 0) + (FILTERS.youtube ? 1 : 0);
  }

  // Bouwt de weergave uit ALLE, met zoekterm (#29) + filters (#…) toegepast.
  function render() {
    if (!GELADEN) return;
    const q = (document.getElementById('zoek').value || '').trim().toLowerCase();
    const tafelSet = parseTafels(FILTERS.tafels);
    const zoekt = (m) => {
      if (!q) return true;
      const a = ((m.playerA && m.playerA.name) || '').toLowerCase();
      const b = ((m.playerB && m.playerB.name) || '').toLowerCase();
      const tf = String((m.table && m.table.name) || '').toLowerCase();
      return a.includes(q) || b.includes(q) || tf === q || ('tafel ' + tf).includes(q);
    };
    const filtert = (m) => {
      if (tafelSet && !tafelSet.has(num(m.table && m.table.name))) return false;
      if (FILTERS.afgelopen && st(m) === 'finished') return false;
      if (FILTERS.youtube && !STREAMS[String((m.table && m.table.name) || '')]) return false;
      return true;
    };
    const basis = ALLE.filter((m) => heeftTafel(m) && zoekt(m) && filtert(m));

    const live = basis.filter((m) => st(m) === 'playing').sort(opTafel);
    const straks = basis.filter((m) => st(m) === 'waiting').sort(opTafel).slice(0, 12);
    const afgelopen = basis.filter((m) => st(m) === 'finished').sort((a, b) => tijd(b.stoptime) - tijd(a.stoptime)).slice(0, 8);

    if (WEERGAVE === 'minimal') {
      const rijen = [...live, ...straks, ...afgelopen].sort(opTafel);
      return rijen.length ? toon(rijen.map(mrij).join('')) : toonLeeg(q);
    }

    const secties = [];
    if (live.length) secties.push(sectie('Nu live', live, 'live'));
    if (straks.length) secties.push(sectie('Straks', straks, 'straks'));
    if (afgelopen.length) secties.push(sectie('Net afgelopen', afgelopen, 'klaar'));
    return secties.length ? toon(secties.join('')) : toonLeeg(q);
  }

  function toonLeeg(q) {
    const ietsActief = q || actieveFilters();
    return toon(`<div class="melding">${ietsActief
      ? 'Geen wedstrijden die aan je zoekopdracht/filters voldoen.'
      : 'Nog geen wedstrijden.<br>Zodra er gespeeld wordt, verschijnen de standen hier vanzelf.'}</div>`);
  }

  function sectie(titel, lijst, soort) {
    const dot = soort === 'live' ? '<span class="dot"></span> ' : '';
    return `<div class="sectiekop">${dot}${esc(titel)} · ${lijst.length}</div>${lijst.map((m) => kaart(m, soort)).join('')}`;
  }

  function kaart(m, soort) {
    const a = (m.playerA && m.playerA.name) || 'nog onbekend';
    const b = (m.playerB && m.playerB.name) || 'nog onbekend';
    const sa = m.scoreA != null ? m.scoreA : 0;
    const sb = m.scoreB != null ? m.scoreB : 0;
    const tnr = (m.table && m.table.name) ? String(m.table.name) : '';
    const tafel = tnr ? `Tafel ${esc(tnr)}` : 'Tafel';
    const race = m.raceTo ? `Race naar ${esc(m.raceTo)}` : '';
    const vid = STREAMS[tnr];
    const kijk = vid ? `<a class="kijk" href="https://www.youtube.com/watch?v=${esc(vid)}" target="_blank" rel="noreferrer">📺 Kijk deze tafel live</a>` : '';
    return `
      <div class="kaart ${esc(soort || '')}">
        <div class="top">
          <span class="tafel">${tafel}</span>
          <span class="toernooi">${esc(m._toernooi)}</span>
        </div>
        <div class="rij">
          <div class="speler">${esc(a)}</div>
          <div class="score">${esc(sa)}<span class="sep">-</span>${esc(sb)}</div>
          <div class="speler b">${esc(b)}</div>
        </div>
        ${race ? `<div class="raceto">${race}</div>` : ''}
        ${kijk}
      </div>`;
  }

  // Eén compacte regel (minimal-weergave): [tafel] speler A  score  speler B  [📺]
  function mrij(m) {
    const soort = st(m) === 'playing' ? 'live' : st(m) === 'finished' ? 'klaar' : '';
    const a = (m.playerA && m.playerA.name) || 'nog onbekend';
    const b = (m.playerB && m.playerB.name) || 'nog onbekend';
    const sa = m.scoreA != null ? m.scoreA : 0;
    const sb = m.scoreB != null ? m.scoreB : 0;
    const tnr = (m.table && m.table.name) ? String(m.table.name) : '?';
    const vid = STREAMS[String(m.table && m.table.name)];
    const kijk = vid
      ? `<a class="mk" title="Kijk deze tafel live" href="https://www.youtube.com/watch?v=${esc(vid)}" target="_blank" rel="noreferrer">📺</a>`
      : '<span></span>';
    return `<div class="mrij ${soort}">
      <span class="mt">${esc(tnr)}</span>
      <span class="ma">${esc(a)}</span>
      <span class="ms">${esc(sa)}<span class="sep">-</span>${esc(sb)}</span>
      <span class="mb">${esc(b)}</span>
      ${kijk}
    </div>`;
  }

  function toon(html) { document.getElementById('inhoud').innerHTML = html; }

  // Zet de knoppen/velden in lijn met de huidige staat (bij laden + na reset/wissel).
  function pasControlsToe() {
    document.getElementById('wStandaard').classList.toggle('aan', WEERGAVE === 'standaard');
    document.getElementById('wMinimal').classList.toggle('aan', WEERGAVE === 'minimal');
    document.getElementById('fTafels').value = FILTERS.tafels || '';
    document.getElementById('fAfgelopen').checked = !!FILTERS.afgelopen;
    document.getElementById('fYoutube').checked = !!FILTERS.youtube;
    const n = actieveFilters();
    const pil = document.getElementById('filterTel');
    pil.textContent = n; pil.hidden = n === 0;
    document.getElementById('filterKnop').classList.toggle('actief', n > 0);
  }

  function setWeergave(w) { WEERGAVE = w; bewaar(); pasControlsToe(); render(); }

  // Events koppelen.
  document.getElementById('zoek').addEventListener('input', render);
  document.getElementById('wStandaard').addEventListener('click', () => setWeergave('standaard'));
  document.getElementById('wMinimal').addEventListener('click', () => setWeergave('minimal'));

  const filtersEl = document.getElementById('filters');
  document.getElementById('filterKnop').addEventListener('click', (e) => {
    const open = filtersEl.classList.toggle('open');
    e.currentTarget.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  document.getElementById('fTafels').addEventListener('input', (e) => { FILTERS.tafels = e.target.value; bewaar(); pasControlsToe(); render(); });
  document.getElementById('fAfgelopen').addEventListener('change', (e) => { FILTERS.afgelopen = e.target.checked; bewaar(); pasControlsToe(); render(); });
  document.getElementById('fYoutube').addEventListener('change', (e) => { FILTERS.youtube = e.target.checked; bewaar(); pasControlsToe(); render(); });
  document.getElementById('fReset').addEventListener('click', () => {
    FILTERS = { tafels: '', afgelopen: false, youtube: false };
    bewaar(); pasControlsToe(); render();
  });

  pasControlsToe();
  laad();
  setInterval(laad, REFRESH_MS);
</script>
</body>
</html>
